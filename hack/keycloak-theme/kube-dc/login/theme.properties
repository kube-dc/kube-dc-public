parent=keycloak
import=common/keycloak
styles=css/kube-dc.css
favIcon=common/resources/favicon.png

# Whitelabel branding — resolved from Keycloak pod env at theme load.
# brandLogoUrl/brandFaviconUrl normally point at the backend's public branding
# endpoint (e.g. https://backend.<domain>/api/public/branding/logo.png) so a
# superadmin logo change shows on the next login render. Empty → bundled assets.
brandName=${env.KUBEDC_BRAND_NAME:Kube-DC}
brandLogoUrl=${env.KUBEDC_LOGO_URL:}
brandFaviconUrl=${env.KUBEDC_FAVICON_URL:}
