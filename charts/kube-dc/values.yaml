      mirrorPath: "ubuntu/24.04/latest/noble-server-cloudimg-amd64.img"
      # Phase 2.2 multi-version discovery via Ubuntu's canonical
      # streams JSON. Lists every dated build; refresh.py picks the
      # newest RETENTION_KEEP and writes one versioned dir per build
