    # version. Per-cluster overrides come from the fleet's HelmRelease
    # (KUBE_DC_MANAGER_TAG in cluster-config.env), which lets ops pin
    # to a specific dev image without re-cutting the chart.
    tag: ""

  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    automount: true
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
  nodeSelector:
    kube-dc-manager: "true"


