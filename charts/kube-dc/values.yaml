# CDI worker-pod GC CronJob. CDI doesn't garbage-collect upload /
# importer / clone pods after their DEADLINE passes; we've seen
# tenants stuck for 51+ days when CDI couldn't produce the upload
# server's TLS Secret. This CronJob audits stuck pods and (if
# `delete: true`) deletes their parent DataVolumes.
# See docs/prd/alerts-noise-cleanup.md §4.F (F1/F2).
cdiUploadGc:
  enabled: true
  # Pods in Pending/Unknown for longer than this many days are
  # considered abandoned. 7d is a conservative default — legitimate
  # large uploads complete within hours.
  staleDays: 7
  # DataVolumes in phase Failed for longer than this many hours are
  # considered terminally broken. CDI itself does not give up on a
  # failing import — live evidence 2026-05-11: 2,838 importer restarts
  # over 10 days for one DV whose source URL had rotated out upstream.
  # 6h is well above the budget of any legitimate import we ship in the
  # default catalog (~700 MB qcow2 at the worst observed WAN
  # throughput). See docs/prd/cdi-acceleration.md §5.1.
  failedHours: 6
  # When false (default), only logs which DataVolumes WOULD be
  # deleted ("[audit] would delete..."). Set to true to enable
  # actual deletion. Recommend running in audit mode for the first
  # cycle to verify the audit list matches operator expectations.
  delete: false
  # Cron schedule. Default: every 6h.
  schedule: "0 */6 * * *"
  # Image needs only `kubectl` and `jq`. We ship our own minimal
  # Alpine + official-kubectl + jq image (~70 MiB) so we don't depend
  # on the deprecated bitnami/ namespace (404'd in 2026) or its
  # bitnamilegacy/ archive. See kube-dc/images/kubectl-jq/README.md
  # for the provenance and Dockerfile.
  image: "shalb/kubectl-jq:v1.35.4"

# ─────────────────────────────────────────────────────────────────────────
# OS-image catalog. The UI's "Create VM" page reads this catalog through
# the backend's /create-vm/{ns}/os-images endpoint (30 s ConfigMap cache).
# Each entry's CLOUD_INIT block is presented to the tenant as the default
# user-data and merged with their per-VM customizations.
#
# Per-entry fields:
#   osName           : human-readable name shown in the UI.
#   cloudUser        : default cloud-init user (image-specific).
#   upstreamURL      : canonical URL on the upstream OS vendor's mirror.
#                      Used as the effective OS_IMAGE_URL unless a
#                      per-cluster mirror is configured (see below).
#   mirrorPath       : (optional) path-suffix on the cluster S3 mirror.
#                      When osImages.mirrorBaseURL is set, the effective
#                      URL becomes "<mirrorBaseURL>/<mirrorPath>" instead
#                      of upstreamURL.
#   sha256           : (optional) expected SHA-256 of the upstream image.
#                      Refresh CronJob verifies before uploading; UI
#                      does not consume it.
#   minMemory/minVCPU/minStorage : minimum VM sizing.
#   firmwareType, machineType, features, bootOrder, additionalDisks :
#                      KubeVirt-side knobs that get rendered into the VM
#                      template (see kube-dc-public/skills/create-vm).
#   cloudInit        : default user-data block (block scalar).
#
# Per-cluster S3 mirror:
#   Setting `osImages.mirrorBaseURL` (e.g. via HelmRelease values in
#   kube-dc-fleet) rewrites every entry's OS_IMAGE_URL to point at that
#   prefix. Entries without a mirrorPath stay on the upstream URL even
#   when mirrorBaseURL is set, so partial mirrors are allowed.
#
#   The fleet's mirror-refresh CronJob
#   (kube-dc-fleet/platform/cdi-os-mirror/refresh-cronjob.yaml) reads
#   the rendered ConfigMap, pulls each upstreamURL, verifies sha256, and
#   uploads to <mirrorBaseURL>/<mirrorPath> on the configured RGW
#   bucket. See docs/prd/cdi-acceleration.md for the full design.
osImages:
  # Empty by default — chart ships upstream URLs out of the box.
  # Override per cluster (e.g. "https://s3.kube-dc.cloud/cdi-os-images")
  # to flip the whole catalog over to the local mirror.
  mirrorBaseURL: ""
  catalog:
    - osName: "Ubuntu 26.04 LTS"
      # Released 2026-04-21 (codename "resolute"). Verified upstream
      # via the canonical streams JSON
      # (com.ubuntu.cloud:server:26.04:amd64). Listed first so the UI
      # picker shows the most recent LTS at the top.
      cloudUser: ubuntu
      upstreamURL: "https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img"
      mirrorPath: "ubuntu/26.04/latest/resolute-server-cloudimg-amd64.img"
      minMemory: "1G"
      minVCPU: "1"
      minStorage: "20G"
      firmwareType: "bios"
      machineType: "q35"
      features: "acpi"
      cloudInit: |
        #cloud-config
        package_update: true
        package_upgrade: true
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    - osName: "Ubuntu 24.04 LTS"
      cloudUser: ubuntu
      upstreamURL: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
      mirrorPath: "ubuntu/24.04/latest/noble-server-cloudimg-amd64.img"
      # Phase 2.2 multi-version discovery via Ubuntu's canonical
      # streams JSON. Lists every dated build; refresh.py picks the
      # newest RETENTION_KEEP and writes one versioned dir per build
      # alongside the /latest/ alias.
      discovery:
        type: ubuntu-streams
        streamsURL: "https://cloud-images.ubuntu.com/releases/streams/v1/com.ubuntu.cloud:released:download.json"
        productID: "com.ubuntu.cloud:server:24.04:amd64"
        ftype: "disk1.img"
      minMemory: "1G"
      minVCPU: "1"
      minStorage: "20G"
      firmwareType: "bios"
      machineType: "q35"
      features: "acpi"
      cloudInit: |
        #cloud-config
        package_update: true
        package_upgrade: true
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    - osName: "Ubuntu 22.04 LTS"
      cloudUser: ubuntu
      upstreamURL: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
      mirrorPath: "ubuntu/22.04/latest/jammy-server-cloudimg-amd64.img"
      discovery:
        type: ubuntu-streams
        streamsURL: "https://cloud-images.ubuntu.com/releases/streams/v1/com.ubuntu.cloud:released:download.json"
        productID: "com.ubuntu.cloud:server:22.04:amd64"
        ftype: "disk1.img"
      minMemory: "1G"
      minVCPU: "1"
      minStorage: "20G"
      firmwareType: "bios"
      machineType: "q35"
      features: "acpi"
      cloudInit: |
        #cloud-config
        package_update: true
        package_upgrade: true
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    - osName: "CentOS Stream 9"
      cloudUser: centos
      upstreamURL: "https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2"
      mirrorPath: "centos-stream/9/latest/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2"
      discovery:
        type: "centos-stream-html"
        indexURL: "https://cloud.centos.org/centos/9-stream/x86_64/images/"
        release: "9"
      minMemory: "2G"
      minVCPU: "1"
      minStorage: "20G"
      firmwareType: "bios"
      machineType: "q35"
      features: "acpi"
      cloudInit: |
        #cloud-config
        package_update: true
        package_upgrade: true
        users:
        - name: centos
          groups: wheel
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          lock_passwd: false
        packages:
          - qemu-guest-agent
          - lrzsz
          - policycoreutils-python-utils
        runcmd:
          - setenforce 0
          - sed -i 's/SELINUX=enforcing/SELINUX=permissive/' /etc/selinux/config
          - setsebool -P virt_qemu_ga_manage_ssh 1
          - setsebool -P virt_qemu_ga_exec 1
          - setsebool -P virt_qemu_ga_file_transfer 1
          - restorecon -R /usr/bin/qemu-ga
          - semanage fcontext -a -t virt_qemu_ga_exec_t '/usr/bin/qemu-ga' || true
          - restorecon /usr/bin/qemu-ga
          - systemctl enable --now qemu-guest-agent
          - systemctl restart qemu-guest-agent
    - osName: "CirrOS (test)"
      cloudUser: cirros
      upstreamURL: "http://download.cirros-cloud.net/0.5.2/cirros-0.5.2-x86_64-disk.img"
      mirrorPath: "cirros/0.5.2/latest/cirros-0.5.2-x86_64-disk.img"
      minMemory: "512M"
      minVCPU: "1"
      minStorage: "5G"
      firmwareType: "bios"
    - osName: "Debian 12 LTS"
      cloudUser: debian
      upstreamURL: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2"
      mirrorPath: "debian/12/latest/debian-12-generic-amd64.qcow2"
      discovery:
        type: "debian-html"
        indexURL: "https://cloud.debian.org/images/cloud/bookworm/"
        release: "12"
        vendor: "generic"
        arch: "amd64"
      minMemory: "1G"
      minVCPU: "1"
      minStorage: "20G"
      firmwareType: "bios"
      machineType: "q35"
      cloudInit: |
        #cloud-config
        package_update: true
        package_upgrade: true
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    - osName: "Fedora 42"
