      features: "hyperv,acpi,apic,smm,tpm"
      bootOrder: "cdrom,disk"
      additionalDisks: "virtio-drivers"
      cloudInit: |
        # Fresh Windows installation with VirtIO drivers
        # Requires manual setup via VNC console

# Internal cluster-local platform endpoints (Fork E2).
#
# Each enabled endpoint renders:
#   - a MetalLB IPAddressPool + L2Advertisement reserving the VIP and
#     announcing it via ARP on the configured interface, and
#   - a selectorless Service of type=LoadBalancer with
#     spec.loadBalancerClass set so MetalLB (filtered by --lb-class)
#     allocates the IP and announces it.
#
# The Service is annotated for kube-dc-manager's platform-endpoint
# controller, which on first reconcile creates an EndpointSlice
# (<svc-name>-mgr, ownerRef to the Service) and maintains its
# addresses from live health probes.
#
# Phase D.1 — only kubeAPI is shipped today. Adding a second endpoint
# means duplicating the kubeAPI shape.
#
# See: docs/prd/internal-platform-endpoints-implementation.md (E2 design)
#      docs/internal/internal-platform-endpoints-runbook.md (operator)
platformEndpoints:
  kubeAPI:
    enabled: false              # opt-in per cluster
    name: kube-api-platform     # Service name; manager slice = <name>-mgr
    namespace: kube-system
    vip: ""                     # REQUIRED if enabled. MUST be in the
                                # ext-cloud Subnet's excludeIps AND in
                                # BOTH INGRESS_GLOBAL_ALLOWLIST and
                                # EGRESS_GLOBAL_ALLOWLIST on every
                                # tenant LR.
    pool: kube-api-platform     # MetalLB IPAddressPool name
    interface: br-ext-cloud     # L2Advertisement interface
    l2AdvNodeSelectors: []      # Constrain MetalLB speaker election to
                                # nodes matching these label selectors.
                                # Empty list = any speaker is eligible
                                # (correct for 1:1-NAT-class
                                # clusters where every node is CP+gw).
                                # For multi-CP/heterogeneous-worker
                                # clusters where some nodes don't have
                                # br-ext-cloud, set to:
                                #   - matchLabels:
                                #       node-role.kubernetes.io/control-plane: "true"
                                # so MetalLB only picks anchored CP nodes.
    loadBalancerClass: metallb  # MUST match the MetalLB controller's
                                # --lb-class flag. 1:1-NAT clusters run
                                # the upstream default "metallb"; an
                                # operator running a different MetalLB
                                # build can override.
    port: 6443
    sessionAffinity: ""         # default: no affinity (apiserver
                                # doesn't need it; affinity + a dead
                                # backend is worse than no affinity)
    backend:
      mode: node-control-plane
      nodeSelector:
        # `key=` empty value is parsed as a label-exists requirement
        # (kubectl convention), so this matches both kubeadm
        # (key="") and RKE2 (key="true") topologies.
        node-role.kubernetes.io/control-plane: ""
      addressType: InternalIP
      health:
        scheme: https
        path: /readyz
        port: 6443
        intervalSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 2
        successThreshold: 1
        # Probe runs without ServiceAccount auth — the apiserver cert
        # SAN does not typically cover the Node InternalIP. The probe
        # is liveness, not authentication.
        insecureSkipVerify: true
        # Default 399 (standard k8s probe convention: 2xx + 3xx).
        # Raise to 499 for auth-gated endpoints like RKE2 /readyz
        # which returns 401 to unauthenticated probes (apiserver
        # process IS alive at that point).
        statusMax: 499
  # Generic Envoy gateway front-door (Phase D.7 — extends Fork E2 to
  # cover every public-hostname'd service tenant pods need to reach:
  # Keycloak login, kube-dc-backend, kube-dc-console, billing, …).
  # Same MetalLB + selectorless-Service + manager-EndpointSlice
  # pattern as kubeAPI; the probe target is Envoy gateway's :443
  # listener instead of kube-apiserver's :6443.
  #
  # When tenant pods resolve login.<DOMAIN> / backend.<DOMAIN> via
  # vpc-dns Corefile, the hostnames rewrite to this VIP. Traffic
  # arrives at the MetalLB-elected speaker's br-ext-cloud → kube-
  # proxy DNATs to one of the Envoy gateway hostNetwork node IPs →
  # Envoy matches the Host header against its HTTPRoutes and forwards
  # to the right backend (keycloak Service, kube-dc-backend Service,
  # etc).
  #
  # Why this is needed: a production 1:1-NAT cluster, 2026-06-02 — kube-dc CLI in
  # the project console pod failed to refresh its OIDC token because
  # tenant pods could not reach login.<cluster-domain> (resolves to
  # the cluster's public IP which hairpin-fails on 1:1-NAT setups).
  # The kubeAPI platform endpoint had already fixed the same gap for
  # kube-api; this generalizes the fix to every Envoy-routed
  # platform hostname.
  envoyGateway:
    enabled: false                   # opt-in per cluster
    name: envoy-gateway-platform     # Service name; manager slice = <name>-mgr
    namespace: envoy-gateway-system
    vip: ""                          # REQUIRED if enabled. MUST be in
                                     # ext-cloud Subnet excludeIps AND
                                     # in BOTH INGRESS_GLOBAL_ALLOWLIST
                                     # and EGRESS_GLOBAL_ALLOWLIST.
    pool: envoy-gateway-platform     # MetalLB IPAddressPool name
    interface: br-ext-cloud
    l2AdvNodeSelectors: []           # Constrain MetalLB speaker election
                                     # (see kubeAPI.l2AdvNodeSelectors).
                                     # Set to control-plane=true on
                                     # heterogeneous-worker clusters.
    loadBalancerClass: metallb
    # Envoy gateway terminates TLS; 443 is the front-door port.
    port: 443
    sessionAffinity: ""
    backend:
      # Envoy gateway data-plane runs as hostNetwork on CP nodes
      # (single-replica today; multi-replica when PRD §6.A Phase A
      # ships). node-control-plane selector hits the right nodes;
      # the probe filters to whichever ones currently have Envoy.
      mode: node-control-plane
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      addressType: InternalIP
      health:
        # TLS handshake against :443 is enough to prove Envoy is up.
        # Envoy may return 302/404/421 for the probe; statusMax=499
        # covers all of those as "process alive".
        #
        # host: REQUIRED — Envoy's HTTPS listener pipeline rejects
        # handshakes whose SNI doesn't match a configured Gateway
        # listener (the probe gets "connection reset by peer" with a
        # bare-IP SNI). Set to one of the cluster's gateway hostnames;
        # `kube-api.<DOMAIN>` works on every kube-dc cluster because
        # the kube-api Gateway is always installed. The probe sends
        # this as both TLS SNI and HTTP Host header.
        scheme: https
        path: /
        port: 443
        host: ""                     # REQUIRED (e.g. "kube-api.${DOMAIN}")
        intervalSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 2
        successThreshold: 1
        insecureSkipVerify: true
        statusMax: 499


# kubelet-csr-approver — Sveltos-distributed addon that auto-approves
# kubelet-serving CSRs (signer kubernetes.io/kubelet-serving) inside every
# managed-K8s tenant cluster. Required for kubelet `serverTLSBootstrap=true`
# (which k8-manager turns on by default via KamajiControlPlane.spec.kubelet.
# configurationJSONPatches) to actually result in serving certs being issued.
#
# This is a tenant-cluster addon — it does NOT run on the management cluster.
# The platform chart only ships the Sveltos ClusterProfile; Sveltos then
# pulls the postfinance/kubelet-csr-approver Helm chart into each matching
# tenant.
#
# Default-on; opt-out per tenant Cluster with label
# `kubelet-csr-approver=disabled`.
#
# Hard requirement: Sveltos must be installed on the cluster (the platform
# layer in kube-dc-fleet/platform/sveltos installs it, so this is satisfied
# on every Flux-managed kube-dc cluster). On a cluster without Sveltos
# CRDs, set kubeletCsrApprover.enabled=false (or install Sveltos first).
#
# Documented in: docs/prd/boc-tenant-kubelet-kubeproxy-observability.md
kubeletCsrApprover:
  enabled: true
  # postfinance/kubelet-csr-approver chart on the upstream gh-pages repo
  repositoryURL: "https://postfinance.github.io/kubelet-csr-approver"
  repositoryName: "postfinance"
  chartName: "postfinance/kubelet-csr-approver"
  chartVersion: "1.2.4"
  releaseName: "kubelet-csr-approver"
  releaseNamespace: "kube-system"
  # Deploy late in the addon ordering so CNI / CoreDNS / kube-api-proxy
  # are already up by the time the approver needs to call the tenant
  # apiserver (typical Sveltos tiers: cilium=1, coredns=10,
  # kube-api-proxy=20, metallb=25 — the approver fits after these).
  tier: 50

  # Acceptance policy for the approver. A permissive csr-approver is worse
  # than no approver — these keep the node-identity binding strict.
  #
  # bypassDnsResolution=true is REQUIRED for kube-dc managed clusters and is
  # the validated default. VERIFIED 2026-06-24 on a CloudSigma production tenant cluster:
  # CloudSigma names nodes by UUID (system:node:<uuid>) which has NO in-tenant
  # DNS record, so with bypassDnsResolution=false the approver cannot resolve
  # the node name to validate the CSR's IP SAN and DENIES every legitimate
  # kubelet-serving CSR ("SAN IP 100.64.x.x is not contained in the set of
  # resolved IP addresses"). With true, the approver skips that DNS-based IP
  # check; security still rests on: CN must be system:node:<name> + group
  # system:nodes (CSR signed by THAT node's own credentials), providerRegex on
  # the name, and the max cert lifetime. This is the standard config for
  # kubeadm/cloud clusters whose node names aren't DNS-resolvable. Proven
  # end-to-end: new node CSR Approved,Issued -> metrics-server scrapes the
  # kubelet over TLS (no --kubelet-insecure-tls).
  policy:
    # Allowed kubelet node-name shape (the part after system:node: in the CSR
    # CN). RFC-1123-ish; wide enough for CloudSigma UUID node names.
    providerRegex: "^[a-z0-9][a-z0-9-]{0,62}$"
    # Skip the DNS-resolve-and-match-IP-SAN check. REQUIRED on kube-dc managed
    # clusters (UUID node names don't resolve) — see header. Identity +
    # providerRegex + lifetime checks still enforced.
    bypassDnsResolution: true
    # Leave non-system:node:* CSRs untouched (don't Deny) — avoids interfering
    # with other workflows watching the same signer.
    ignoreNonSystemNodeCsr: true
    # Node hostnames are UUIDs that don't resolve; don't require resolution.
    bypassHostnameCheck: false
    # Cap cert lifetime at ~366 days (kubelet rotates well before this).
    maxExpirationSeconds: 31622400
