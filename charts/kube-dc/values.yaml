      minVCPU: "1"
      minStorage: "20G"
      firmwareType: "bios"
      machineType: "q35"
      features: "acpi"
      cloudInit: |
        #cloud-config
        package_update: true
        package_upgrade: true
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    - osName: "Ubuntu 24.04 LTS"
