        package_upgrade: true
        users:
        - name: centos
          groups: wheel
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          lock_passwd: false
        packages:
          - qemu-guest-agent
          - lrzsz
          - policycoreutils-python-utils
        runcmd:
          - setenforce 0
          - sed -i 's/SELINUX=enforcing/SELINUX=permissive/' /etc/selinux/config
