        ftype: "disk1.img"
      minMemory: "1G"
      minVCPU: "1"
      minStorage: "20G"
      firmwareType: "bios"
      machineType: "q35"
      features: "acpi"
      cloudInit: |
        #cloud-config
        package_update: true
        package_upgrade: true
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    # Ubuntu 22.04 LTS deprecated from the catalog 2026-06-23 — superseded by
