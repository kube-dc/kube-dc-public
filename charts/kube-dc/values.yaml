kubeApiExternalUrl: "" # Required, example: "kube-api.stage.kube-dc.com:6443"

# Per-cluster S3 endpoint. Threaded into:
#   - kube-dc-backend (S3_ENDPOINT env): UI object-storage views,
#     KdcDatabase endpoint hints, billing/quota responses.
#   - db-manager (S3_ENDPOINT env): default S3 endpoint for
#     KdcDatabase backups when `spec.backup.s3Endpoint` is not set
#     per-resource.
#
# REQUIRED for any cluster that wants S3-backed object storage (Rook
# Ceph, external Ceph, AWS S3, MinIO, …). No hardcoded fallback by
# design — kube-dc ships to many environments, and a default like
# `https://s3.kube-dc.cloud` would silently route customer S3 traffic
# (object storage, database backups) to a domain those clusters don't
# own.
s3Endpoint: ""  # example: "https://s3.stage.kube-dc.com"

# Per-cluster public Grafana URL. Threaded into kube-dc-backend
# (GRAFANA_URL env) for the "Open Grafana" SSO launch redirect. Same
# rationale as s3Endpoint — no fallback, must be set per-cluster.
grafanaUrl: ""  # example: "https://grafana.stage.kube-dc.com"

manager:
  logLevel: 1 # 5 - Debug
  keycloakDebug: false
  ovnDbIps: "" # Required, example: "tcp:192.168.0.1:6641"

  # Admission webhooks for security.kube-dc.com/v1alpha1 (M0-T03).
  # Adds Service + cert-manager Certificate + Mutating/Validating
  # configurations covering ManagedSecret, ManagedCertificate, KMSKey,
  # DatabaseCredentialPolicy. Requires cert-manager.io CRDs to be
  # installed (already a hard dependency of the platform).
  #
  # Disable only when bootstrapping a cluster that does not yet have
  # cert-manager installed; the security CRDs will still apply, but
  # defaulting + validation will be bypassed.
  webhook:
    enabled: true

  # OpenBao integration (M1+, see docs/prd/openbao-integration*.md).
  # Threaded into master-config as enable_openbao / openbao_url /
  # openbao_ca_bundle — MasterConfigSpec reads these to gate the OpenBao
  # reconcilers (Org Namespace, Project KV mount, ESO SecretStore,
  # OrganizationGroup policies). When disabled or url is empty, every
  # reconciler returns ErrOpenBaoDisabled and IsBootstrapGap silences
  # it — safe to leave off on clusters that haven't installed OpenBao.
  openBao:
    enabled: false
    # In-cluster TLS endpoint of the OpenBao service. Public DNS
    # (https://bao.<domain>) works too, but in-cluster is preferred
    # because it avoids egress + matches the cert SANs OpenBao serves.
    url: ""
    # Optional extra CA bundle for openbao.url. Empty when the chart
    # uses cert-manager-issued certs already trusted by the manager.
    caBundle: ""

  # grafanaTenantMode selects how the Organization controller shapes
  # per-tenant Grafana Orgs and the matching grafana-jwt-org-mapping
  # ConfigMap entries.
  #
  #   "org" (DEFAULT — every cloud + non-CS install) — one Grafana Org
  #     per kube-dc Organization, federated tenantList covering the
  #     org-level namespace + all project namespaces. JWT auth maps
  #     each realm to its single Grafana Org.
  #
  #   "project" — single-Org clusters with multiple Projects (today only
  #     marketplace-partner management planes). Manager creates the org-level admin Org as before AND
  #     one Grafana Org per Project, named after the Project's
  #     namespace, with a single-tenant datasource scoped to that
  #     namespace. JWT auth maps each user's namespaces[0] claim to
  #     the matching per-Project Grafana Org so a user with one
  #     OrganizationGroup grant only sees their own Project's logs.
  #
  # Leave at "org" unless you're deploying onto a marketplace-partner-style
  # management plane.
  grafanaTenantMode: org

  # Egress network isolation: blocks cross-project traffic on external subnets.
  # When enabled, project VPCs get deny rules for external subnets and allow rules for own EIPs.
  # Management VPC (ovn-cluster) is never affected.
  egressNetworkIsolation: true
  # Global allowlist of IPs/CIDRs that ALL projects can reach even with isolation enabled.
  # Use for shared infrastructure (monitoring, logging, shared databases, etc.).
  egressGlobalAllowlist: []
    # - "100.65.0.200"
    # - "10.8.0.0/24"

  # Ingress network isolation: blocks inbound traffic from shared external VLANs to project VPCs.
  # When enabled, project VPCs get deny rules for external subnets and allow rules for whitelisted source IPs.
  # Management VPC (ovn-cluster) is never affected. Disabled by default (opt-in).
  ingressNetworkIsolation: false
  # Global allowlist of source IPs/CIDRs allowed to reach ALL project VPCs when ingress isolation is enabled.
  # Use for shared infrastructure (NAT GW VMs, monitoring, bastion hosts, etc.).
  ingressGlobalAllowlist: []
    # - "100.64.200.1"

  # Gate creation of Projects with spec.egressNetworkType=public.
  # FALSE by default — fresh installs reject public-egress projects.
  # Flip to true only on clusters that have a public external network
  # (e.g. an `ext-public` Kube-OVN subnet) AND the operator wants
  # tenants to be able to expose projects directly to the public
  # internet. The Project ValidatingWebhook enforces this server-side
  # (rejects CREATE with egressNetworkType=public when false); the
  # kube-dc UI hides the "public" option in the project-create form.
  # Existing public-egress Projects are NOT affected — egressNetworkType
  # is immutable, so the safe default can't break in-flight clusters
  # that already created public projects (cloud).
  # See docs/prd/public-projects-gate.md.
  allowPublicProjects: false

  extraEnv: []
    # - name: EXAMPLE_VAR
    #   value: "example-value"
    # - name: SECRET_VAR
    #   valueFrom:
    #     secretKeyRef:
    #       name: mysecret
    #       key: secretkey

  keycloakSecret: {}
    # url: <KEYCLOAK_URL>
    # user: <KEYCLOAK_USER>
    # password: <KEYCLOAK_PASSWORD>
    # masterRealm: <KEYCLOAK_MASTER_REALM_NAME>
    # consoleUrl: <KUBE_DC_CONSOLE_URL>

  image:
    repository: shalb/kube-dc-manager
    pullPolicy: IfNotPresent
    # Empty string falls back to .Chart.AppVersion in the deployment
    # template — keeps the chart's default tag in lock-step with its
    # version. Per-cluster overrides come from the fleet's HelmRelease
    # (KUBE_DC_MANAGER_TAG in cluster-config.env), which lets ops pin
    # to a specific dev image without re-cutting the chart.
    tag: ""

  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    automount: true
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
  nodeSelector:
    kube-dc-manager: "true"


frontend:
  replicaCount: 2
  # Extra environment variables for the container
  extraEnv: []
    # - name: EXAMPLE_VAR
    #   value: "example-value"
    # - name: SECRET_VAR
    #   valueFrom:
    #     secretKeyRef:
    #       name: mysecret
    #       key: secretkey
  
  # Extra JavaScript environment variables for the frontend application
  # These will be available as window.VARIABLE_NAME in the frontend code
  extraJsEnv: {}
    # apiVersion: "v1"
    # featureNewUI: "true"
    # authTimeout: "3600"
  image:
    repository: shalb/kube-dc-ui-frontend
    pullPolicy: IfNotPresent
    # Empty → fall back to .Chart.AppVersion (see manager.image.tag).
    tag: ""

  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    automount: true
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  service:
    type: ClusterIP
    port: 8080

  gateway:
    hostname: "" # Required: Set to your frontend hostname, e.g., console.example.com
    parentRef:
      name: eg
      namespace: envoy-gateway-system
    # Per-route long-timeout override applied to the dedicated /api/cloud-shell
    # rule so ttyd-backed terminal WebSockets survive past Envoy's 15s default.
    longLivedTimeout: "1h"

  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  livenessProbe:
    httpGet:
      path: /
      port: 80
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 80
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  nodeSelector: {}

  tolerations: []

  affinity: {}

# ── adminFrontend (superadmin console) ──────────────────────────────────────────
# The admin SPA (shalb/kube-dc-admin-frontend). Served at admin.<domain> via the
# Gateway's `https-admin` listener (defined on the Gateway, not here). The image
# generates env.js at runtime from the env vars below, so no env.js ConfigMap mount
# is needed. Disable on clusters that don't run the console (e.g. marketplace-partner clusters).
adminFrontend:
  # Default OFF so the chart renders without admin-specific values (gateway.hostname
  # is required when enabled). Clusters that run the console set
  # adminFrontend.enabled=true + hostname in the fleet HelmRelease.
  enabled: false
  replicaCount: 2
  image:
    repository: shalb/kube-dc-admin-frontend
    # Empty → fall back to .Chart.AppVersion (same as manager/frontend). Fleet pins
    # KUBE_DC_ADMIN_FRONTEND_TAG → adminFrontend.image.tag for its own version line.
    tag: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    # Static SPA — no Kubernetes API access, so don't mount a token.
    automount: false
  # Runtime config → window._env_ (admin docker-entrypoint generates env.js):
  # BACKEND_URL defaults to https://<backend.gateway.hostname>; KEYCLOAK_URL to
  # manager.keycloakSecret.url. Override here only for a non-default endpoint.
  keycloakUrl: ""
  keycloakRealm: "master"
  keycloakClientId: "kube-dc-admin-console"
  extraEnv: []
  service:
    type: ClusterIP
    port: 80
  gateway:
    enabled: true
    hostname: ""   # Required when enabled: admin.<domain>
    parentRef:
      name: eg
      namespace: envoy-gateway-system
      sectionName: https-admin
  podAnnotations: {}
  podSecurityContext: {}
  # Conservative hardening that does NOT break the root nginx:alpine image. Do NOT
  # drop capabilities: nginx's entrypoint chowns /var/cache/nginx and spawns workers
  # via setuid, needing CHOWN/SETUID/SETGID — dropping ALL caused CrashLoopBackOff
  # ("chown(...) Operation not permitted"). Full cap-drop / readOnlyRootFilesystem
  # needs an unprivileged nginx image listening on :8080 (image-side follow-up).
  securityContext:
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 200m, memory: 256Mi}
  livenessProbe:
    httpGet: {path: /, port: http}
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    httpGet: {path: /, port: http}
    initialDelaySeconds: 5
    periodSeconds: 10
  autoscaling:
    enabled: false
  nodeSelector: {}
  tolerations: []
  affinity: {}

backend:
  # Note: keycloakUrl, consoleUrl, appUrl are read from master-config secret

  # M1-T06-FU1: source-IP consistent-hash via Envoy Gateway
  # BackendTrafficPolicy. Pins each tenant to a single backend pod
  # so the in-memory org-admin elevation store (util/elevation.js)
  # stays consistent across follow-up calls. Disable on
  # single-replica deployments where the BTP is just noise.
  # See templates/backend-traffic-policy.yaml for the trade-offs.
  consistentHash:
    enabled: true

  # M1-T05: structured audit events for /api/secrets/* (and later
  # /api/certificates/*, /api/kms/*, /api/database-credentials/*)
  # ship to Loki with low-cardinality stream labels per dev-scope §5.
  # The push endpoint defaults to the in-cluster loki-gateway under
  # the `system` tenant; set lokiPushUrl to "" to disable emission
  # without breaking the rest of the API.
  audit:
    lokiPushUrl: "http://loki-gateway.monitoring.svc:80"
    # Optional override for the query path (M1-T05b
    # /api/audit/* endpoints). Defaults to lokiPushUrl so both sides
    # stay in lock-step; set this when the push and query paths use
    # different hostnames (e.g. distinct Loki write + read
    # deployments).
    lokiQueryUrl: ""
    tenant: "system"

  # SMTP configuration for email notifications (all required for email to work)
  smtp:
    enabled: false
    host: "" # e.g., "smtp.gmail.com"
    port: "587"
    secure: "false" # "true" for port 465
    user: "" # SMTP username
    password: "" # SMTP password (use secret reference in production)
    from: "" # e.g., "noreply@example.com"
    fromName: "Kube-DC"
  
  replicaCount: 2
  extraEnv: []
      # - name: PROM_URL
      #   value: "http://prometheus:9090"
  image:
    repository: shalb/kube-dc-ui-backend
    pullPolicy: IfNotPresent
    # Empty → fall back to .Chart.AppVersion (see manager.image.tag).
    tag: ""

  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    automount: true
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  service:
    type: ClusterIP
    port: 8080

  gateway:
    hostname: "" # Required: Set to your backend hostname, e.g., backend.example.com
    parentRef:
      name: eg
      namespace: envoy-gateway-system
    # Request timeout for the backend HTTPRoute. Org self-registration creates a
    # Keycloak realm + CRs (~30s), so keep this well above Envoy's 15s default.
    requestTimeout: "120s"
    # Per-route long-timeout override applied to the dedicated /api/cloud-shell
    # rule so ttyd-backed terminal WebSockets survive long sessions.
    longLivedTimeout: "1h"

  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  livenessProbe:
    httpGet:
      path: /
      port: 3333
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 3333
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  nodeSelector: {}

  tolerations: []

  affinity: {}

# k8-manager - Kubernetes cluster management controller
k8Manager:
  enabled: true
  replicaCount: 1

  image:
    repository: shalb/kube-dc-k8-manager
    pullPolicy: IfNotPresent
    tag: "latest"

  # External endpoint for the infrastructure cluster API
  # Required for CCMs running in VPC-isolated namespaces that cannot reach kubernetes.default.svc
  # Format: "host:port" (e.g., "kube-api.stage.kube-dc.com:6443")
  infraAPIEndpoint: ""

  # M5-T04 managed-K8s etcd encryption-at-rest knobs.
  #
  # kmsPluginImage: the kube-dc-kms-plugin sidecar image the encryption
  # reconciler injects into Kamaji TCPs/KCPs when a KdcCluster opts into
  # spec.encryption.etcd.enabled=true. Empty disables the feature with
  # a clear error in the reconciler (KMS_PLUGIN_IMAGE env not set).
  # See docs/internal/managed-k8s-encryption-runbook.md for the live-
  # smoke procedure.
  kmsPluginImage: ""

  # openBaoUrl: where the kms-plugin sidecar dials OpenBao Transit.
  # When empty the reconciler refuses to provision encryption. Usually
  # left empty for cloud and inherited from MasterConfig at runtime via
  # the cluster's chart-managed master-config Secret; set explicitly
  # here only when you want the chart to pin a specific URL on the
  # k8-manager Deployment.
  openBaoUrl: ""

  # Kamaji datastore configuration
  kamajiDatastoreName: "default"
  kamajiDatastoreNamespace: "kamaji-system"

  # Enable metrics endpoint
  metricsEnabled: false

  # Extra arguments for the manager
  extraArgs: []

  # Extra environment variables
  extraEnv: []

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  nodeSelector: {}

  tolerations: []

  affinity: {}

# Billing configuration
billing:
  # Billing provider: "none" (quota-only), "stripe", "whmcs", or "dual"
  # Default is "none" so a fresh install boots without pre-existing
  # billing secrets (stripe-billing / whmcs-credentials). Installs
  # that want billing flip this via HelmRelease values + provision
  # the matching Secrets.
  provider: "none"

  # Stripe-specific settings (only used when provider=stripe or dual)
  stripe:
    # Name of the K8s Secret created by hack/bootstrap-stripe.sh
    # Contains STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, and STRIPE_PRICE_* keys
    secretName: "stripe-billing"

  # billing-plans ConfigMap — deployed when enabled
  # Required by both the Go controller (organization quotas) and the UI backend (plan display)
  plans:
    enabled: true
    config: |
      plans:
        dev-pool:
          displayName: "Dev Pool"
          description: "Best for: Sandbox / Dev"
          price: 19
          currency: "EUR"
          recommended: false
          objectStorage: 20
          ipv4: 1
          features:
            - "4 vCPU"
            - "8 GB RAM"
            - "60 GB NVMe Storage"
            - "20 GB Object Storage included"
            - "1 Dedicated IPv4"
            - "Nested Clusters (KubeVirt)"
            - "Unlimited 1Gbit/s Bandwidth"
          # Dev Pool: fully guaranteed (burstRatio=1.0). The advertised
          # 4 vCPU / 8 GB are the requests *and* the limits. KubeVirt VMs
          # (used by KdcCluster workers) consume the full requests quota
          # for their reservation, so a burst-quota dev plan would cap
          # cluster workers at requests/burstRatio (= 2 vCPU before this
          # change) despite the "4 vCPU" plan tier. Keeping Dev Pool at
          # 1.0× makes the entry tier do exactly what it says. Burst
          # economics remain on Pro/Scale where customers opt in.
          requests:
            cpu: "4"
            memory: "8Gi"
            storage: "60Gi"
          pods: 100
          servicesLB: 100
          burstRatio: 1.0
          limitRange:
            defaultCPU: "500m"
            defaultMemory: "512Mi"
            defaultRequestCPU: "100m"
            defaultRequestMem: "128Mi"
            maxCPU: "4"
            maxMemory: "8Gi"
            minCPU: "1m"
            minMemory: "1Mi"
            maxPodCPU: "4"
            maxPodMemory: "8Gi"
            maxPVCStorage: "60Gi"
            minPVCStorage: "10Mi"
        pro-pool:
          displayName: "Pro Pool"
          description: "Best for: Production / Teams"
          price: 49
          currency: "EUR"
          recommended: true
          objectStorage: 100
          ipv4: 1
          features:
            - "8 vCPU"
            - "24 GB RAM"
            - "160 GB NVMe Storage"
            - "100 GB Object Storage included"
            - "1 Dedicated IPv4"
            - "Nested Clusters (KubeVirt)"
            - "Unlimited 1Gbit/s Bandwidth"
          # Pro Pool: fully guaranteed (burstRatio=1.0). Advertised
          # 8 vCPU / 24 GB RAM are the requests *and* the limits; no
          # burst. Was requests 6/18 × burstRatio 1.34; now 8/24 × 1.0 —
          # same limit ceiling, but guaranteed at the request level so
          # KubeVirt workers / VPA / HRQ accounting all see the advertised
          # capacity. Same fair-resources model as Dev Pool above; see
          # that comment for the economics rationale.
          requests:
            cpu: "8"
            memory: "24Gi"
            storage: "160Gi"
          pods: 200
          servicesLB: 100
          burstRatio: 1.0
          limitRange:
            defaultCPU: "500m"
            defaultMemory: "512Mi"
            defaultRequestCPU: "250m"
            defaultRequestMem: "256Mi"
            maxCPU: "8"
            maxMemory: "24Gi"
            minCPU: "1m"
            minMemory: "1Mi"
            maxPodCPU: "8"
            maxPodMemory: "24Gi"
            maxPVCStorage: "160Gi"
            minPVCStorage: "10Mi"
        scale-pool:
          displayName: "Scale Pool"
          description: "Best for: High Load / VDC"
          price: 99
          currency: "EUR"
          recommended: false
          objectStorage: 500
          ipv4: 3
          features:
            - "16 vCPU"
            - "56 GB RAM"
            - "320 GB NVMe Storage"
            - "500 GB Object Storage included"
            - "3 Dedicated IPv4"
            - "Nested Clusters (KubeVirt)"
            - "Unlimited 1Gbit/s Bandwidth"
          # Scale Pool: fully guaranteed (burstRatio=1.0). Advertised
          # 16 vCPU / 56 GB RAM are the requests *and* the limits; no
          # burst. Was requests 12/42 × burstRatio 1.34; now 16/56 × 1.0
          # — same limit ceiling, guaranteed at the request level.
          requests:
            cpu: "16"
            memory: "56Gi"
            storage: "320Gi"
          pods: 500
          servicesLB: 100
          burstRatio: 1.0
          limitRange:
            defaultCPU: "1"
            defaultMemory: "1Gi"
            defaultRequestCPU: "500m"
            defaultRequestMem: "512Mi"
            maxCPU: "16"
            maxMemory: "56Gi"
            minCPU: "1m"
            minMemory: "1Mi"
            maxPodCPU: "16"
            maxPodMemory: "56Gi"
            maxPVCStorage: "320Gi"
            minPVCStorage: "10Mi"
      suspendedPlan:
        cpu: "500m"
        memory: "1Gi"
        pods: 10
        servicesLB: 0
      systemOverhead:
        cpuPerProject: 0
        memPerProject: 0
      addons:
        turbo-x1:
          displayName: "Turbo x1"
          description: "+4 GB RAM • +2 vCPU (Burst)"
          price: 9
          currency: "EUR"
          cpu: "2"
          memory: "4Gi"
          storage: "20Gi"
        turbo-x2:
          displayName: "Turbo x2"
          description: "+8 GB RAM • +4 vCPU (Burst)"
          price: 16
          currency: "EUR"
          cpu: "4"
          memory: "8Gi"
          storage: "40Gi"
      eipQuota:
        dev-pool: 1
        pro-pool: 1
        scale-pool: 3

dbManager:
  enabled: false
  replicaCount: 1
  metricsEnabled: true

  infraAPIEndpoint: "" # Required when enabled, e.g. "kube-api.stage.kube-dc.com:6443"

  image:
    repository: shalb/db-manager
    pullPolicy: IfNotPresent
    tag: "v0.1.3"

  extraEnv: []

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# CDI worker-pod GC CronJob. CDI doesn't garbage-collect upload /
# importer / clone pods after their DEADLINE passes; we've seen
# tenants stuck for 51+ days when CDI couldn't produce the upload
# server's TLS Secret. This CronJob audits stuck pods and (if
# `delete: true`) deletes their parent DataVolumes.
# See docs/prd/alerts-noise-cleanup.md §4.F (F1/F2).
cdiUploadGc:
  enabled: true
  # Pods in Pending/Unknown for longer than this many days are
  # considered abandoned. 7d is a conservative default — legitimate
  # large uploads complete within hours.
  staleDays: 7
  # DataVolumes in phase Failed for longer than this many hours are
  # considered terminally broken. CDI itself does not give up on a
  # failing import — live evidence 2026-05-11: 2,838 importer restarts
  # over 10 days for one DV whose source URL had rotated out upstream.
  # 6h is well above the budget of any legitimate import we ship in the
  # default catalog (~700 MB qcow2 at the worst observed WAN
  # throughput). See docs/prd/cdi-acceleration.md §5.1.
  failedHours: 6
  # DataVolumes still in ImportInProgress / ImportScheduled past this
  # many minutes are deleted (when `delete: true`). Implements PRD
  # §5.1.1 time-bound importer retries without a Go controller:
  # CDI has no native `failureRetryLimit` equivalent, so a stuck
  # importer would crashloop indefinitely (the 2,838-restart class).
  # 30m is comfortably above the wall-clock budget of any image in the
  # default catalog at typical WAN throughput (Windows golden 21 GiB
  # ~10m over LAN; a 30-min importer is broken, not slow).
  importDeadlineMinutes: 30
  # When false (default), only logs which DataVolumes WOULD be
  # deleted ("[audit] would delete..."). Set to true to enable
  # actual deletion. Recommend running in audit mode for the first
  # cycle to verify the audit list matches operator expectations.
  delete: false
  # Cron schedule. Default: every 6h.
  schedule: "0 */6 * * *"
  # Image needs only `kubectl` and `jq`. We ship our own minimal
  # Alpine + official-kubectl + jq image (~70 MiB) so we don't depend
  # on the deprecated bitnami/ namespace (404'd in 2026) or its
  # bitnamilegacy/ archive. See kube-dc/images/kubectl-jq/README.md
  # for the provenance and Dockerfile.
  image: "shalb/kubectl-jq:v1.35.4"

# ─────────────────────────────────────────────────────────────────────────
# CDI mirror + importer health alerts. Sources entirely from
# kube-state-metrics (kube_job_failed, kube_cronjob_status_last_*,
# kube_pod_container_status_restarts_total) so no Prometheus exporter
# sidecar is required. Disable on clusters without prometheus-operator
# installed (the CR will fail validation if the CRD is absent).
# See docs/prd/cdi-acceleration.md §6.1 and
# docs/prd/cdi-os-image-registry.md §9.1.
cdiMirrorAlerts:
  enabled: true

# ServiceMonitor for kubevirt's per-component metrics endpoint
# (virt-handler, virt-controller, virt-api, virt-operator). Provides
# every kubevirt_vmi_* series to Prometheus / Alloy-metrics so VM
# dashboards in Grafana + the kube-dc UI's VM detail panels populate.
#
# Multi-tenant clusters (Alloy-metrics → cortex-tenant → Mimir): the
# scraped samples carry the VMI's namespace as the `namespace` label,
# so per-VM metrics route to the matching tenant's Mimir org
# automatically via the fleet's alloy-metrics relabel pipeline. No
# extra chart wiring needed.
#
# Single-tenant clusters (prom-operator-prometheus direct): same SM,
# samples just land in the single Prometheus.
#
# Disable on clusters without prometheus-operator CRDs installed
# (the SM CR will fail apiserver validation otherwise).
kubevirtServiceMonitor:
  enabled: true
  name: prometheus-kubevirt-rules
  namespace: kubevirt

# ─────────────────────────────────────────────────────────────────────────
# OS-image catalog. The UI's "Create VM" page reads this catalog through
# the backend's /create-vm/{ns}/os-images endpoint (30 s ConfigMap cache).
# Each entry's CLOUD_INIT block is presented to the tenant as the default
# user-data and merged with their per-VM customizations.
#
# Per-entry fields:
#   osName           : human-readable name shown in the UI.
#   cloudUser        : default cloud-init user (image-specific).
#   upstreamURL      : canonical URL on the upstream OS vendor's mirror.
#                      Used as the effective OS_IMAGE_URL unless a
#                      per-cluster mirror is configured (see below).
#   mirrorPath       : (optional) path-suffix on the cluster S3 mirror.
#                      When osImages.mirrorBaseURL is set, the effective
#                      URL becomes "<mirrorBaseURL>/<mirrorPath>" instead
#                      of upstreamURL.
#   sha256           : (optional) expected SHA-256 of the upstream image.
#                      Refresh CronJob verifies before uploading; UI
#                      does not consume it.
#   minMemory/minVCPU/minStorage : minimum VM sizing.
#   firmwareType, machineType, features, bootOrder, additionalDisks :
#                      KubeVirt-side knobs that get rendered into the VM
#                      template (see kube-dc-public/skills/create-vm).
#   cloudInit        : default user-data block (block scalar).
#
# Per-cluster S3 mirror:
#   Setting `osImages.mirrorBaseURL` (e.g. via HelmRelease values in
#   kube-dc-fleet) rewrites every entry's OS_IMAGE_URL to point at that
#   prefix. Entries without a mirrorPath stay on the upstream URL even
#   when mirrorBaseURL is set, so partial mirrors are allowed.
#
#   The fleet's mirror-refresh CronJob
#   (kube-dc-fleet/platform/cdi-os-mirror/refresh-cronjob.yaml) reads
#   the rendered ConfigMap, pulls each upstreamURL, verifies sha256, and
#   uploads to <mirrorBaseURL>/<mirrorPath> on the configured RGW
#   bucket. See docs/prd/cdi-acceleration.md for the full design.
# cert-manager → OpenBao PKI binding for the M2 Certificate Manager.
# When a tenant requests a `private` ManagedCertificate the reconciler
# creates a per-Project ServiceAccount named "kube-dc-pki-issuer";
# cert-manager-controller needs `create` on `serviceaccounts/token`
# scoped to that exact SA name to swap a projected token at OpenBao
# auth/k8s-host and back-issue the cert. See
# charts/kube-dc/templates/cert-manager-pki-tokenrequester-rbac.yaml.
#
# Override `serviceAccountName` / `serviceAccountNamespace` if the
# cluster runs cert-manager with non-default values. Set
# `enabled: false` to skip the binding entirely on clusters that have
# no plans to issue private certs (public ACME stays available either
# way through the existing `letsencrypt-prod-http` ClusterIssuer).
certManagerPkiBinding:
  enabled: true
  serviceAccountName: cert-manager
  serviceAccountNamespace: cert-manager

osImages:
  # Empty by default — chart ships upstream URLs out of the box.
  # Override per cluster (e.g. "https://s3.kube-dc.cloud/cdi-os-images")
  # to flip the whole catalog over to the local mirror.
  mirrorBaseURL: ""
  catalog:
    - osName: "Ubuntu 26.04 LTS"
      # Released 2026-04-21 (codename "resolute"). Verified upstream
