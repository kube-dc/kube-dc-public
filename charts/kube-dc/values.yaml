      discovery:
        type: "opensuse-leap-html"
        indexURL: "https://download.opensuse.org/distribution/leap/15.6/appliances/"
        release: "15.6"
      minMemory: "2G"
      minVCPU: "1"
      minStorage: "20G"
      firmwareType: "bios"
      machineType: "q35"
      features: "acpi"
      cloudInit: |
