---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
    helm.sh/resource-policy: keep
  name: managedcertificates.security.kube-dc.com
spec:
  group: security.kube-dc.com
  names:
    kind: ManagedCertificate
    listKind: ManagedCertificateList
    plural: managedcertificates
    shortNames:
      - mcert
    singular: managedcertificate
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.type
          name: Type
          type: string
        - jsonPath: .spec.purpose
          name: Purpose
          type: string
        - jsonPath: .status.notAfter
          name: Expires
          type: date
        - jsonPath: .spec.targetSecretName
          name: Secret
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            ManagedCertificate is the user-facing certificate object. It wraps
            cert-manager and the OpenBao PKI engine; tenants never deal with raw
            Certificate resources or PKI roles directly.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                ManagedCertificateSpec declares a certificate request. The controller
                creates and owns a cert-manager Certificate to fulfil it.
              properties:
                dnsNames:
                  description: |-
                    DnsNames are the SANs requested. Validated against the Organization's
                    allowed certificate domains by the validating webhook.
                  items:
                    type: string
                  minItems: 1
                  type: array
                duration:
                  default: 90d
                  description: Duration is the issued certificate validity period.
                  pattern: ^[1-9][0-9]*(d|h|m|s|ms|us|ns)([1-9][0-9]*(d|h|m|s|ms|us|ns))*$
                  type: string
                ipAddresses:
                  description: IpAddresses are optional IP SANs.
                  items:
                    type: string
                  type: array
                purpose:
                  default: server
                  description: Purpose maps to a controller-chosen set of x509 key-usages.
                  enum:
                    - server
                    - client
                    - mtls
                    - code-signing
                  type: string
                renewBefore:
                  default: 15d
                  description: RenewBefore is how long before expiry the controller renews.
                  pattern: ^[1-9][0-9]*(d|h|m|s|ms|us|ns)([1-9][0-9]*(d|h|m|s|ms|us|ns))*$
                  type: string
                targetSecretName:
                  description: |-
                    TargetSecretName is the Kubernetes Secret that holds tls.crt/tls.key
                    after issuance.
                  maxLength: 253
                  type: string
                type:
                  description: |-
                    Type selects between the Organization's private intermediate CA and
                    the public ACME path.
                  enum:
                    - private
                    - public
                  type: string
              required:
                - dnsNames
                - targetSecretName
                - type
              type: object
            status:
              description: ManagedCertificateStatus reflects observed state.
              properties:
                certificateSecretName:
                  description: |-
                    CertificateSecretName mirrors spec.targetSecretName once issuance
                    succeeds, for UI consumption.
                  type: string
                conditions:
                  description: |-
                    Conditions: Ready, DomainValidated, Issued, PKIReady (private only).
                    Ready mirrors the underlying cert-manager Certificate's Ready
                    condition (False/Unknown when the Certificate isn't yet
                    observable). Issued reports whether the target Secret holds a
                    usable cert; PKIReady is False during initial OpenBao
                    platform-root/per-Org intermediate provisioning.
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                issuer:
                  description: |-
                    Issuer is the OpenBao PKI mount or ACME issuer that signed the
                    current certificate.
                  type: string
                notAfter:
                  format: date-time
                  type: string
                notBefore:
                  description: NotBefore / NotAfter as observed from the issued certificate.
                  format: date-time
                  type: string
                renewalTime:
                  description: RenewalTime is the next scheduled renewal.
                  format: date-time
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
