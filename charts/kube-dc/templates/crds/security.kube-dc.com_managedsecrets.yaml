---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
    helm.sh/resource-policy: keep
  name: managedsecrets.security.kube-dc.com
spec:
  group: security.kube-dc.com
  names:
    kind: ManagedSecret
    listKind: ManagedSecretList
    plural: managedsecrets
    shortNames:
      - msec
    singular: managedsecret
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.type
          name: Type
          type: string
        - jsonPath: .status.currentVersion
          name: Version
          type: integer
        - jsonPath: .status.syncedSecretName
          name: Synced
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            ManagedSecret is the user-facing object that declares a project secret
            (name, type, sync target, rotation policy). Values live in OpenBao and
            are written through the Kube-DC API/CLI/UI, never in spec.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                ManagedSecretSpec declares *intent* for a project secret. Values are
                never carried in spec; they are written through the Kube-DC API/CLI/UI.
              properties:
                description:
                  description: Description is a short, free-text annotation surfaced in the UI.
                  maxLength: 256
                  type: string
                rotation:
                  description: |-
                    Rotation enables controller-driven new-version generation on a schedule.
                    Currently meaningful for type=password; other types may rotate via
                    out-of-band writes.
                  properties:
                    enabled:
                      description: Enabled toggles scheduled rotation.
                      type: boolean
                    generator:
                      description: |-
                        Generator is honored when spec.type=password. For other types the
                        rotation step is a no-op (user-driven write of a new version).
                      properties:
                        charset:
                          default: alnum-symbol
                          description: Charset selects the alphabet used by the generator.
                          enum:
                            - alnum
                            - alnum-symbol
                            - hex
                          type: string
                        length:
                          default: 32
                          description: Length of the generated password.
                          maximum: 128
                          minimum: 8
                          type: integer
                      type: object
                    interval:
                      description: Interval between rotations. Required when Enabled.
                      pattern: ^[1-9][0-9]*(d|h|m|s|ms|us|ns)([1-9][0-9]*(d|h|m|s|ms|us|ns))*$
                      type: string
                  type: object
                sync:
                  description: Sync controls projection of values to a Kubernetes Secret via ESO.
                  properties:
                    enabled:
                      default: false
                      description: |-
                        Enabled toggles ESO projection. When false (the default) the secret
                        values live only in OpenBao and are accessed through the Kube-DC API.
                      type: boolean
                    keys:
                      description: |-
                        Keys to project. An empty list means "all keys" — preferred for the
                        common case.
                      items:
                        type: string
                      type: array
                    refreshInterval:
                      default: 1h
                      description: |-
                        RefreshInterval is how often ESO refetches values from OpenBao.
                        Minimum 1m, maximum 24h. Defaults to 1h.
                      pattern: ^[1-9][0-9]*(d|h|m|s|ms|us|ns)([1-9][0-9]*(d|h|m|s|ms|us|ns))*$
                      type: string
                    targetSecretName:
                      description: |-
                        TargetSecretName is the name of the Kubernetes Secret created/updated
                        by ESO. Defaults to metadata.name if empty (set by the defaulting
                        webhook).
                      maxLength: 253
                      type: string
                  type: object
                type:
                  default: opaque
                  description: Type drives UI affordances and certain controller defaults.
                  enum:
                    - opaque
                    - password
                    - api-key
                    - tls
                    - db-static
                  type: string
              type: object
            status:
              description: ManagedSecretStatus reflects the observed state.
              properties:
                conditions:
                  description: 'Conditions: Ready, Synced, RotationScheduled, OpenBaoMounted.'
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                currentVersion:
                  description: |-
                    CurrentVersion is the latest OpenBao KV v2 version visible to the
                    project.
                  type: integer
                lastRotatedTime:
                  description: LastRotatedTime is the most recent controller-driven rotation.
                  format: date-time
                  type: string
                lastSyncedTime:
                  description: LastSyncedTime is the most recent successful ESO projection.
                  format: date-time
                  type: string
                nextRotationTime:
                  description: NextRotationTime is the next scheduled rotation, if any.
                  format: date-time
                  type: string
                syncedSecretName:
                  description: |-
                    SyncedSecretName is the Kubernetes Secret currently owned by ESO for
                    this ManagedSecret. Empty when sync is disabled or not yet ready.
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
