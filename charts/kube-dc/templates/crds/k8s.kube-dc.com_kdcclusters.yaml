            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KdcClusterSpec defines the desired state of KdcCluster
            properties:
              backup:
                description: |-
                  Backup configures scheduled etcd snapshots for this cluster's control
                  plane. When omitted, snapshots are enabled automatically if the Project
                  has a managed-k8s-backups S3 bucket (auto-provisioned when Rook-Ceph
                  is available). Set Enabled=false to opt out explicitly.
                properties:
                  destinationPath:
                    description: |-
                      DestinationPath overrides the default S3 URI for snapshot uploads.
                      Default: s3://<projectNamespace>-managed-k8s-backups/<clusterName>/
                    type: string
                  enabled:
                    default: true
                    description: Enabled controls whether the backup CronJob is created.
                    type: boolean
                  retentionDays:
                    default: 7
                    description: |-
                      RetentionDays is the number of days to retain snapshots. Enforced
                      via S3 object lifecycle policy on the bucket; controller-driven GC
                      is the fallback for backends that do not support lifecycle rules.
                    format: int32
                    maximum: 365
                    minimum: 1
                    type: integer
                  s3CredentialSecret:
                    description: |-
                      S3CredentialSecret overrides the Secret carrying S3 credentials.
                      Default: managed-k8s-backups (auto-managed via the Project OBC).
                    type: string
                  s3Endpoint:
                    description: |-
                      S3Endpoint overrides the S3 endpoint URL. Default: discovered from
                      the OBC-generated ConfigMap (BUCKET_HOST + BUCKET_PORT).
                    type: string
                  schedule:
                    default: 0 2 * * *
                    description: Schedule is a 5-field cron expression for the snapshot
                      CronJob.
                    type: string
                type: object
              controlPlane:
                description: Control plane configuration
                properties:
                  autoscaling:
                    description: |-
                      Autoscaling configuration for control plane containers.
                      When omitted, a VerticalPodAutoscaler is created in
                      "InPlaceOrRecreate" mode so requests/limits are right-sized
                      from observed usage. To disable autoscaling and keep static
                      resources, set Mode=Off and optionally provide Resources.
                      See docs/prd/control-plane-vpa-autoscaling.md for the full design.
                    properties:
                      maxAllowed:
                        additionalProperties:
                          additionalProperties:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          description: ResourceList is a set of (resource name, quantity)
                            pairs.
                          type: object
                        description: |-
                          MaxAllowed overrides the per-container upper bound the VPA recommender
                          is allowed to recommend for this cluster's control plane. When unset,
                          global defaults apply (kube-apiserver: 2000m / 2Gi; kube-controller-manager
                          and kube-scheduler: 500m / 512Mi).

                          Use to lift the cap on genuinely heavy tenant clusters whose
                          kube-apiserver working set legitimately exceeds 2 GiB (large CRD
                          surface, bursty list-watch traffic). The default is intentionally
                          tight to bound the cluster-wide request bookkeeping — uncapped VPA
                          recommendations can pin master nodes at 99% memory requested while
                          real usage is far lower, blocking other pods from scheduling.

                          Only the kube-apiserver entry is consulted; KCM and scheduler caps
                          stay at their conservative global values. Map keys must match
                          container names (currently only "kube-apiserver" is honored).
                        type: object
                      minReplicas:
                        description: |-
                          MinReplicas is the minimum number of CP replicas the VPA updater will
                          leave running during eviction. When unset, defaults to ControlPlane.Replicas
                          so VPA never reduces the CP below its desired replica count.
                          Only honored in Recreate / InPlaceOrRecreate modes.
                        format: int32
                        type: integer
                      mode:
                        default: InPlaceOrRecreate
                        description: |-
                          Mode selects how VPA applies recommendations.
                            Off               : recommendations only (no automatic adjustments)
                            Initial           : inject at pod creation, never evict to resize
                            Recreate          : evict pods to apply new sizes (disruptive)
                            InPlaceOrRecreate : K8s 1.33+ in-place resize, fallback to eviction
                                                (default; CPU resize is restart-free)
                        enum:
                        - "Off"
                        - Initial
                        - Recreate
                        - InPlaceOrRecreate
                        type: string
                    type: object
                  replicas:
                    default: 2
                    description: Number of control plane replicas
                    format: int32
                    type: integer
                  resources:
                    description: |-
                      Resources optionally pins static requests/limits for the tenant
                      control plane containers (apiServer, controllerManager, scheduler).
                      When set, the controller writes these values to the underlying
                      TenantControlPlane on every reconcile. Use this to opt out of
                      VPA-driven sizing for specific clusters that need fixed capacity
                      (e.g. multi-tenant production CPs with strict SLOs).

                      Behavior matrix:
                        Resources unset, Autoscaling.Mode != Off:
                          baseline 1:1.2 ratio set ONCE on TCP creation; VPA owns
                          subsequent updates in-place.
                        Resources unset, Autoscaling.Mode == Off:
                          baseline 1:1.2 ratio reconciled to the TCP every loop.
                        Resources set:
                          supplied values reconciled to the TCP every loop, regardless
                          of Autoscaling.Mode. VPA recommendations still surface in
                          status.controlPlane.recommendations as a sizing hint.
                    properties:
                      apiServer:
                        description: APIServer overrides resources for the kube-apiserver
                          container.
                        properties:
                          limits:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            description: Limits describes the maximum amount of compute
                              resources allowed.
                            type: object
                          requests:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            description: Requests describes the minimum amount of
                              compute resources required.
                            type: object
                        type: object
                      controllerManager:
                        description: ControllerManager overrides resources for kube-controller-manager.
                        properties:
                          limits:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            description: Limits describes the maximum amount of compute
                              resources allowed.
                            type: object
                          requests:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            description: Requests describes the minimum amount of
                              compute resources required.
                            type: object
                        type: object
                      scheduler:
                        description: Scheduler overrides resources for kube-scheduler.
                        properties:
                          limits:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            description: Limits describes the maximum amount of compute
                              resources allowed.
                            type: object
                          requests:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            description: Requests describes the minimum amount of
                              compute resources required.
                            type: object
                        type: object
                    type: object
                type: object
              dataStore:
                description: DataStore reference
                properties:
                  dedicated:
                    default: false
                    description: |-
                      Create a dedicated DataStore for this cluster
                      When true, creates a dedicated etcd DataStore that will be deleted with the cluster
                      When false (default), uses an existing shared DataStore
                    type: boolean
                  eipName:
                    description: |-
                      EIP name to use for the dedicated DataStore LoadBalancer service
                      Defaults to "default-gw" if not specified
                    type: string
                  name:
                    description: |-
                      Name of the KdcClusterDatastore to use
                      If not specified, will auto-discover in same namespace
                    type: string
                  namespace:
                    description: Namespace of the DataStore (defaults to cluster namespace)
                    type: string
                  port:
                    description: |-
                      Port to expose the dedicated DataStore on the shared EIP
                      Must be unique per EIP to avoid conflicts
                      Defaults to 2379 if not specified
                    format: int32
                    maximum: 65535
                    minimum: 1024
                    type: integer
                type: object
              eip:
                description: External IP configuration for API server
                properties:
                  create:
                    default: true
                    description: Create a new EIP or use existing
                    type: boolean
                  externalNetworkType:
                    default: public
                    description: External network type (public/cloud)
                    type: string
                  name:
                    description: Name of existing EIP to use (if create=false)
                    type: string
                type: object
              enableClusterAPI:
                default: false
                description: |-
                  Enable Cluster API integration
                  When enabled, creates CAPI Cluster and KamajiControlPlane resources
                type: boolean
              encryption:
                description: |-
                  Encryption configures cluster-level encryption-at-rest. When omitted,
                  the cluster runs with plaintext etcd contents (matching the historic
                  behaviour). See docs/internal/managed-k8s-encryption-design.md for
                  the M5 design.
                properties:
                  etcd:
                    description: |-
                      Etcd opts the cluster into etcd-at-rest encryption via a sidecar KMS
                      plugin backed by an OpenBao Transit KEK. See the design doc for the
                      envelope model: the kube-apiserver owns object encryption; the plugin
                      only wraps/unwraps per-object DEKs.
                    properties:
                      backup:
                        description: |-
                          Backup configures the snapshot-file wrapper (Layer 2). When omitted,
                          the same KMSKey as KeyRef is reused — simpler restore, single key
                          to protect. See design doc §9.2 for the rationale.
                        properties:
                          keyRef:
                            description: |-
                              KeyRef names a KMSKey for the backup snapshot wrapper. Defaults to
                              EtcdEncryptionSpec.KeyRef. Must have purpose=etcd or purpose=backup.
                              Same validation rules as EtcdEncryptionSpec.KeyRef.
                            type: string
                        type: object
                      disableRequested:
                        description: |-
                          DisableRequested drives the two-step disable migration. Setting
                          DisableRequested=true while Enabled=true is the documented path to
                          turn encryption off without orphaning encrypted etcd rows:

                            1. Tenant sets DisableRequested=true.
                            2. Controller walks `Resources` and PUTs every object so the
                               apiserver re-encrypts each row with the identity provider
                               (i.e. plaintext) under the still-active KMS provider.
                            3. Controller verifies no rows carry the `k8s:enc:kms:v2:`
                               prefix.
                            4. Controller detaches the KMS provider from
                               EncryptionConfiguration.
                            5. Tenant may now flip Enabled=false.

                          Progress surfaces via status.encryption.disableMigrationProgress.
                        type: boolean
                      enabled:
                        default: false
                        description: |-
                          Enabled toggles the feature on.

                          The disable path is NOT a simple flip — once an encrypted write has
                          landed, the controller requires the two-step DisableRequested flow
                          (see field below) so encrypted rows are rewrapped to identity before
                          the KMS provider is detached. A break-glass admin annotation
                          `security.kube-dc.com/encryption-force-disable-confirmed=<RFC3339>`
                          bypasses the migration for incident response.
                        type: boolean
                      kekRotation:
                        description: |-
                          KEKRotation configures automatic rotation of the per-cluster Key
                          Encryption Key (KEK) — the OpenBao Transit key that wraps every
                          etcd DEK and every backup-snapshot DEK. M5-T06 plumbing; the actual
                          rotation scheduler lives in the M3 KMSKey reconciler
                          (kube-dc-manager). When omitted or Enabled=false, the auto-
                          provisioned KMSKey runs with rotation disabled; existing encrypted
                          etcd rows and existing backup envelopes remain decryptable with
                          the original key version indefinitely.

                          When the tenant supplied an explicit KeyRef above (operator-owned
                          KMSKey), the controller WILL NOT mutate that KMSKey's rotation
                          policy. Instead it surfaces a KEKRotationManagedExternally warning
                          condition so the runbook flags the discrepancy.

                          See docs/prd/managed-k8s-kek-rotation.md for the full design.
                        properties:
                          enabled:
                            default: false
                            description: |-
                              Enabled toggles scheduled rotation. Default: false. Even when
                              encryption is on, rotation must be opted in explicitly.
                            type: boolean
                          interval:
                            description: |-
                              Interval between rotations. Required when Enabled. KubeDC duration
                              string (e.g. "90d", "2160h"). Units are d, h, m, s — matching the
                              kube-dc KMSKey-side parser. "w" (weeks) is NOT accepted.

                              Bounded at reconcile-time to [7d, 730d]; values below the bound
                              are refused because OpenBao Transit's own min_rotation_interval
                              guardrail would refuse them anyway, and values above the bound
                              are effectively "never" (operators who want that should set
                              Enabled=false).

                              When backups are enabled, the reconciler also refuses intervals
                              lower than `spec.backup.retentionDays` to keep on-disk snapshots
                              restorable under the still-active key versions.

                              NOTE on validation timing: there is no admission webhook for
                              KdcCluster yet; refusal happens during the next reconcile and
                              surfaces as an EncryptionConfigError condition. Invalid specs
                              are accepted by the apiserver but never produce side effects.
                            type: string
                        type: object
                      keyRef:
                        description: |-
                          KeyRef names a KMSKey CR in the same namespace whose OpenBao Transit
                          key acts as the KEK for etcd-row encryption (Layer 1).

                          Optional: when omitted and Enabled=true, the controller auto-
                          provisions `<cluster>-etcd` with purpose=etcd and
                          deletionPolicy=retain. The auto-created KMSKey is associated to
                          the KdcCluster via labels — NOT a Kubernetes OwnerReference — so
                          Kubernetes garbage collection cannot delete the key while retained
                          etcd backups still reference it. Lifecycle is governed by a
                          platform-managed finalizer that releases the key only after
                          retained backups have expired (see design doc §12.2).

                          Labels set on the auto-provisioned KMSKey:
                            k8s.kube-dc.com/kdccluster: <cluster>
                            security.kube-dc.com/managed-by: kdccluster

                          When provided, the KMSKey must be (a) Ready, (b) in the same
                          namespace, (c) spec.purpose=etcd, (d) not scheduled for deletion,
                          (e) not already referenced by another KdcCluster unless the
                          shared-key opt-in annotation `security.kube-dc.com/allow-shared-etcd-key`
                          is set on this KdcCluster.
                        type: string
                      resources:
                        default:
                        - secrets
                        description: |-
                          Resources is the K8s EncryptionConfiguration resources list.
                          Enum-constrained in M5 to avoid foot-guns (high-churn resources
                          like `events` would multiply apiserver/KMS load; bootstrap-time
                          resources can't be reached until KMS is ready).

                          Defaults to ["secrets"] when omitted. Must contain at least one
                          entry (empty lists are rejected at admission to prevent the
                          confusing "enabled but encrypts nothing" shape).
                        items:
                          enum:
                          - secrets
                          - configmaps
                          type: string
                        maxItems: 2
                        minItems: 1
                        type: array
                        x-kubernetes-list-type: set
                    required:
                    - enabled
                    type: object
                type: object
              kubelet:
                description: |-
                  Kubelet exposes a curated subset of kubelet configuration applied to
                  ALL worker nodes of this cluster (node-level resource reservations,
                  eviction thresholds, and the per-node pod cap). It is translated into
                  RFC-6902 JSON patches on the kubelet configuration the control plane
                  ships to nodes (KamajiControlPlane.spec.kubelet.configurationJSONPatches).

                  NOTE: kubelet config takes effect per node when the node reads its
                  /var/lib/kubelet/config.yaml — i.e. immediately for NEW nodes, and for
                  existing nodes only after a reboot/replace (or `kubeadm upgrade node`).
                  Changing these values does not live-reconfigure already-running kubelets.
                properties:
                  evictionHard:
                    additionalProperties:
                      description: |-
                        EvictionThreshold is a kubelet hard-eviction value: a quantity ("500Mi") or
                        a percentage ("10%"). Validated via OpenAPI Pattern/MaxLength (NOT CEL).
                      maxLength: 32
                      pattern: ^[0-9]+(\.[0-9]+)?(%|m|k|Ki|M|Mi|G|Gi|T|Ti|P|Pi)?$
                      type: string
                    description: |-
                      EvictionHard sets hard eviction thresholds: the node reclaims resources
                      (and evicts Pods) with no grace period once a signal crosses the
                      threshold. Allowed keys (signals): "memory.available",
                      "nodefs.available", "nodefs.inodesFree", "imagefs.available",
                      "imagefs.inodesFree", "pid.available". Values are quantities (e.g.
                      "500Mi") or percentages (e.g. "10%").

                      Mis-set eviction thresholds can make a node unschedulable or flap, so
                      keys are enum-validated (CEL) and values format-validated (Pattern). The
                      controller also emits mergeDefaultEvictionSettings=true so a partial map
                      does not zero the kubelet's omitted default signals.
                    maxProperties: 6
                    type: object
                    x-kubernetes-validations:
                    - message: evictionHard keys must be valid kubelet eviction signals
                        (memory.available, nodefs.available, nodefs.inodesFree, imagefs.available,
                        imagefs.inodesFree, pid.available)
                      rule: self.all(k, k in ['memory.available','nodefs.available','nodefs.inodesFree','imagefs.available','imagefs.inodesFree','pid.available'])
                  kubeReserved:
                    additionalProperties:
                      description: |-
                        ReservedQuantity is a kubelet resource-reservation value, e.g. "500m", "1Gi".
                        Format + length are validated via OpenAPI Pattern/MaxLength (NOT CEL) so the
                        per-value check stays off the CRD's CEL cost budget. The accepted set is a
                        curated subset of the Kubernetes quantity grammar.
                      maxLength: 32
                      pattern: ^[0-9]+(\.[0-9]+)?(m|k|Ki|M|Mi|G|Gi|T|Ti|P|Pi)?$
                      type: string
                    description: |-
                      KubeReserved reserves compute resources for Kubernetes node components
                      (the kubelet, the container runtime). Allowed keys: "cpu", "memory",
                      "ephemeral-storage". Values are quantities (e.g. "500m", "1Gi").
                    maxProperties: 3
                    type: object
                    x-kubernetes-validations:
                    - message: 'kubeReserved keys must be one of: cpu, memory, ephemeral-storage'
                      rule: self.all(k, k in ['cpu','memory','ephemeral-storage'])
                  maxPods:
                    description: |-
                      MaxPods is the maximum number of Pods that can run on a single node.
                      The kubelet default is 110. Raise it for high-density nodes (ensure the
                      pod CIDR per node and the CNI can accommodate it).
                    format: int32
                    maximum: 2500
                    minimum: 10
                    type: integer
                  systemReserved:
                    additionalProperties:
                      description: |-
                        ReservedQuantity is a kubelet resource-reservation value, e.g. "500m", "1Gi".
                        Format + length are validated via OpenAPI Pattern/MaxLength (NOT CEL) so the
                        per-value check stays off the CRD's CEL cost budget. The accepted set is a
                        curated subset of the Kubernetes quantity grammar.
                      maxLength: 32
                      pattern: ^[0-9]+(\.[0-9]+)?(m|k|Ki|M|Mi|G|Gi|T|Ti|P|Pi)?$
                      type: string
                    description: |-
                      SystemReserved reserves compute resources for OS system daemons (sshd,
                      udev, the kernel). Allowed keys: "cpu", "memory", "ephemeral-storage".
                      Values are quantities.
                    maxProperties: 3
                    type: object
                    x-kubernetes-validations:
                    - message: 'systemReserved keys must be one of: cpu, memory, ephemeral-storage'
                      rule: self.all(k, k in ['cpu','memory','ephemeral-storage'])
                type: object
              network:
                description: Network configuration
                properties:
                  podCIDR:
                    default: 10.244.0.0/16
                    description: Pod CIDR
                    type: string
                  serviceCIDR:
                    default: 10.96.0.0/12
                    description: Service CIDR
                    type: string
                type: object
              publicApiEndpoint:
                default: false
                description: |-
                  PublicAPIEndpoint, when true on a private-link cluster (one whose
                  workers have CloudSigma.PrivateAPIEndpointIP set), creates an Envoy
                  Gateway TLSRoute that exposes the kube-apiserver publicly via the
                  shared management-cluster Gateway. The private MetalLB VIP remains
                  the primary path; this is a break-glass fallback for when the
                  customer VLAN is unavailable.

                  On non-private-link clusters this field is a no-op (those clusters
                  expose publicly via the existing expose-route annotation regardless
                  of this field).

                  Disabling this field removes the TLSRoute and reverts the admin
                  kubeconfig's server: URL to the non-exposed form. Cert SANs keep the
                  private VIP entry, so the private kubeconfig is unaffected.

                  See docs/prd/private-link-public-breakglass.md for the security
                  implications and rollout plan.
                type: boolean
              version:
                description: Kubernetes version for the control plane
                type: string
              workers:
                description: |-
                  Worker node pools configuration (requires enableClusterAPI=true)
                  Supports multiple pools with different configurations
                items:
                  description: |-
                    WorkerPoolSpec defines a worker node pool configuration for CAPI + KubeVirt
                    Supports multiple pools with different CPU, memory, and architecture profiles
                  properties:
                    architecture:
                      default: amd64
                      description: |-
                        Architecture for this worker pool (amd64, arm64, etc.)
                        Used for node selection and image variants
                      type: string
                    cloudsigma:
                      description: CloudSigma-specific configuration (used when infrastructureProvider=cloudsigma)
                      properties:
                        ccmImage:
                          default: docker.io/shalb/cloudsigma-ccm:latest
                          description: Cloud Controller Manager image
                          type: string
                        cpuMHz:
                          description: |-
                            CPU in MHz (overrides calculation from cpuCores)
                            If not specified, CPU is calculated as: cpuCores * mhzPerCore (default: 2000 MHz per core)
                            Example: 2000 = 2 GHz (1 core), 4000 = 4 GHz (2 cores with 2 GHz each)
                          format: int32
                          minimum: 1000
                          type: integer
                        diskSizeGB:
                          description: |-
                            Disk size in GB (overrides default calculation from memory)
                            If not specified, disk size is calculated based on memory (e.g., 2x memory)
                          format: int32
                          type: integer
                        imageUUID:
                          description: |-
                            CloudSigma image UUID (boot disk/image)
                            This is the VM template/image UUID from CloudSigma
                          type: string
                        meta:
                          additionalProperties:
                            type: string
                          description: CloudSigma server metadata (key-value pairs)
                          type: object
                        mhzPerCore:
                          default: 2000
                          description: |-
                            MHz per core (used when converting cpuCores to MHz)
                            Default: 2000 MHz per core (CloudSigma default)
                            Example: mhzPerCore=3000 with cpuCores=2 gives 6000 MHz total
                          format: int32
                          minimum: 1000
                          type: integer
                        nics:
                          description: Network interface configurations
                          items:
                            description: |-
                              CloudSigmaNICSpec defines a CloudSigma network interface configuration.

                              Exactly one of VLAN or Public must be set:
                                - VLAN attaches the NIC to a CloudSigma VLAN. Combine with IPPoolRef
                                  for static IPAM (cloud VLAN); omit for VLAN DHCP (customer-managed).
                                - Public attaches a CloudSigma public IP via DHCP. Use this together
