---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
    helm.sh/resource-policy: keep
  name: databasecredentialpolicies.security.kube-dc.com
spec:
  group: security.kube-dc.com
  names:
    kind: DatabaseCredentialPolicy
    listKind: DatabaseCredentialPolicyList
    plural: databasecredentialpolicies
    shortNames:
      - dbcp
    singular: databasecredentialpolicy
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.databaseRef.name
          name: Database
          type: string
        - jsonPath: .spec.mode
          name: Mode
          type: string
        - jsonPath: .status.username
          name: Username
          type: string
        - jsonPath: .status.targetSecretName
          name: Secret
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            DatabaseCredentialPolicy declares how Kube-DC should issue and rotate
            credentials for a KdcDatabase. Static-rotated mode produces a long-lived
            password that the controller rotates on a schedule; dynamic mode issues
            short-lived leases per request.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                DatabaseCredentialPolicySpec declares a credential policy for an
                existing KdcDatabase in the same project namespace.
              properties:
                databaseRef:
                  description: |-
                    DatabaseRef points at a KdcDatabase in the *same project namespace*.
                    Cross-namespace references are impossible by API shape; the
                    validating webhook verifies existence at admit time.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                maxTtl:
                  description: MaxTTL caps the lease duration including renewals.
                  pattern: ^[1-9][0-9]*(d|h|m|s|ms|us|ns)([1-9][0-9]*(d|h|m|s|ms|us|ns))*$
                  type: string
                mode:
                  description: Mode selects between static-rotated and dynamic credentials.
                  enum:
                    - static-rotated
                    - dynamic
                  type: string
                role:
                  description: |-
                    Role is the OpenBao Database engine role name to issue against
                    (dynamic mode only).
                  type: string
                rotation:
                  description: Rotation describes the static-rotated cadence.
                  properties:
                    interval:
                      default: 30d
                      description: Interval between rotations.
                      pattern: ^[1-9][0-9]*(d|h|m|s|ms|us|ns)([1-9][0-9]*(d|h|m|s|ms|us|ns))*$
                      type: string
                    strategy:
                      default: rolling
                      description: |-
                        Strategy: "rolling" (default) keeps the previous password valid for
                        one cycle to avoid dropping live connections; "immediate" cuts over
                        at once.
                      enum:
                        - rolling
                        - immediate
                      type: string
                  type: object
                sync:
                  description: Sync controls projection of credentials into a Kubernetes Secret.
                  properties:
                    enabled:
                      description: |-
                        Enabled toggles sync. The mutating webhook forces this to true
                        for static-rotated mode when the user omits both `sync` and
                        `sync.enabled` (the 90% case — minimal manifest still projects a
                        Secret), and forces it to false for dynamic mode. Explicit
                        false on a static-rotated policy is respected.

                        Pointer type is required so the webhook can distinguish "user
                        omitted the field" (nil) from "user explicitly set false". A
                        plain bool with `omitempty` would conflate the two and a
                        minimal manifest would silently skip Secret projection
                        (M4-T02 review P1/P2).
                      type: boolean
                    targetSecretName:
                      description: TargetSecretName defaults to metadata.name if empty.
                      maxLength: 253
                      type: string
                  type: object
                ttl:
                  description: TTL is the requested lease duration for dynamic mode.
                  pattern: ^[1-9][0-9]*(d|h|m|s|ms|us|ns)([1-9][0-9]*(d|h|m|s|ms|us|ns))*$
                  type: string
                username:
                  default: app
                  description: Username for static-rotated mode. Defaults to "app".
                  type: string
              required:
                - databaseRef
                - mode
              type: object
            status:
              description: DatabaseCredentialPolicyStatus reflects observed state.
              properties:
                conditions:
                  description: 'Conditions: Ready, Synced, RotationScheduled.'
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                endpoint:
                  description: |-
                    Endpoint is the discovered DB endpoint (host:port) — convenience for
                    UI/CLI consumption.
                  type: string
                lastRotatedTime:
                  description: |-
                    LastRotatedTime is the most recent successful rotation
                    (static-rotated mode only).
                  format: date-time
                  type: string
                leaseSupported:
                  description: |-
                    LeaseSupported reports whether the underlying engine supports
                    dynamic credentials. Surfaced for the UI to enable/disable controls.
                  type: boolean
                nextRotationTime:
                  description: |-
                    NextRotationTime is the next scheduled rotation
                    (static-rotated mode only).
                  format: date-time
                  type: string
                targetSecretName:
                  description: TargetSecretName mirrors spec.sync.targetSecretName after defaulting.
                  type: string
                username:
                  description: Username currently active (resolves any defaulting).
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
