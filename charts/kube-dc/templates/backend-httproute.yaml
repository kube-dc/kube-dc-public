{{- $fullName := include "kube-dc.backend.fullname" . -}}
{{- $svcPort := .Values.backend.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "kube-dc.backend.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.backend.gateway.parentRef.name | default "eg" }}
    namespace: {{ .Values.backend.gateway.parentRef.namespace | default "envoy-gateway-system" }}
    sectionName: {{ .Values.backend.gateway.parentRef.sectionName | default "https-backend" }}
  hostnames:
  - {{ .Values.backend.gateway.hostname }}
  rules:
  # ttyd-backed cloud-shell / project-console WebSocket proxy. ttyd holds the
  # WebSocket open for the lifetime of the terminal session (often many
  # minutes / hours), so the 120s catch-all below kills active terminals with
  # "upstream request timeout". Match this prefix first with a much longer
  # timeout. Gateway API rule matching prefers more specific PathPrefix, so
  # this rule fires before the `/` catch-all.
  - matches:
    - path:
        type: PathPrefix
        value: /api/cloud-shell
    timeouts:
      request: {{ .Values.backend.gateway.longLivedTimeout | default "1h" | quote }}
      backendRequest: {{ .Values.backend.gateway.longLivedTimeout | default "1h" | quote }}
    backendRefs:
    - name: {{ $fullName }}
      port: {{ $svcPort }}
  - matches:
    - path:
        type: PathPrefix
        value: /
    # Org self-registration creates a Keycloak realm + CRs and can take ~30s.
    # Envoy's default request timeout (15s) resets the client mid-request, so
    # the browser sees a failed POST /api/register/org even though it succeeds.
    timeouts:
      request: {{ .Values.backend.gateway.requestTimeout | default "120s" | quote }}
      backendRequest: {{ .Values.backend.gateway.requestTimeout | default "120s" | quote }}
    backendRefs:
    - name: {{ $fullName }}
      port: {{ $svcPort }}
