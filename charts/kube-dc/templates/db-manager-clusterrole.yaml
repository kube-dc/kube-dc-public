{{- if .Values.dbManager.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-dc.dbmanager.fullname" . }}
  labels:
    {{- include "kube-dc.dbmanager.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
# M4-T01: db-manager resolves a KdcDatabase's owning Org by reading
# the project namespace's `hnc.x-k8s.io/subnamespace-of` annotation.
# Needs list+watch (not just get) because controller-runtime's cached
# client always sets up an informer per Kind it reads — a get-only
# binding produces a "Failed to watch *v1.Namespace: forbidden" log
# spam loop. Permissions are still narrow: read-only against namespace
# metadata, no edits.
- apiGroups: [""]
  resources: [namespaces]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list, patch, watch]
# PVC delete is required by the in-place restore flow: db-manager removes
# the engine cluster's PVCs after deleting the engine CR so the new
# Cluster/MariaDB bootstraps onto fresh volumes (CNPG/mariadb-operator
# both refuse to reuse PVCs for a recovery bootstrap).
- apiGroups: [""]
  resources: [persistentvolumeclaims]
  verbs: [delete, get, list, watch]
- apiGroups: [""]
  resources: [secrets]
  verbs: [create, get, list, update, watch]
- apiGroups: [""]
  resources: [services]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [batch]
  resources: [jobs]
  verbs: [create, delete, get, list, watch]
# M3-T05 FU1: db-manager renders per-database post-process CronJobs
# that run an operator-supplied wrapper image to encrypt backups
# at rest. Owned by the KdcDatabase; CRUD here so the controller
# can render + reconcile + clean up.
- apiGroups: [batch]
  resources: [cronjobs]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [db.kube-dc.com]
  resources: [kdcdatabases]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [db.kube-dc.com]
  resources: [kdcdatabases/finalizers]
  verbs: [update]
- apiGroups: [db.kube-dc.com]
  resources: [kdcdatabases/status]
  verbs: [get, patch, update]
- apiGroups: [gateway.envoyproxy.io]
  resources: [backends]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [gateway.networking.k8s.io]
  resources: [tlsroutes]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [k8s.mariadb.com]
  resources: [mariadbs, physicalbackups]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [k8s.mariadb.com]
  resources: [mariadbs/status]
  verbs: [get]
# `backups` (logical) is read by the UI snapshot listing path and is
# reserved for a future logical-restore mode. CRUD here lets the
# operator manage it later without another RBAC bump.
- apiGroups: [k8s.mariadb.com]
  resources: [backups]
  verbs: [create, delete, get, list, watch]
- apiGroups: [kube-dc.com]
  resources: [eips]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [kube-dc.com]
  resources: [projects]
  verbs: [get, list, watch]
- apiGroups: [objectbucket.io]
  resources: [objectbucketclaims]
  verbs: [create, delete, get, list, watch]
- apiGroups: [postgresql.cnpg.io]
  resources: [clusters, scheduledbackups]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [postgresql.cnpg.io]
  resources: [clusters/status]
  verbs: [get]
# `backups` (the cnpg.io/Backup CR) is the source-of-truth for restore:
# `bootstrap.recovery.backup.name` references it. The operator must be
# able to create on-demand Backup CRs (UI "snapshot now") and delete
# stale ones during teardown.
- apiGroups: [postgresql.cnpg.io]
  resources: [backups]
  verbs: [create, delete, get, list, watch]
# M3-T05 envelope encryption: db-manager reads the kube-dc KMSKey CR
# (security.kube-dc.com/v1alpha1) to pull status.keyId for the
# OpenBao Transit wrap path. Read-only; the KMSKey lifecycle stays
# on the kube-dc-manager side.
- apiGroups: [security.kube-dc.com]
  resources: [kmskeys]
  verbs: [get, list, watch]
{{- end }}
