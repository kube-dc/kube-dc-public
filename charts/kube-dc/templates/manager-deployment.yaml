apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-dc.manager.fullname" . }}
  labels:
    {{- include "kube-dc.manager.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kube-dc.manager.selectorLabels" . | nindent 6 }}
  replicas: 1
  template:
    metadata:
      annotations:
        # Rolls the manager Pod whenever the master-config Secret content
        # changes. The Secret is rendered from chart values
        # (manager.allowPublicProjects, network-isolation flags, etc.) —
        # flipping any of those means the in-memory ConfigGlobal.MasterConfig
        # cache in the running manager is stale until restart. The checksum
        # here forces Helm to roll the Deployment on Secret change.
        # See kube-dc/docs/prd/public-projects-gate.md (F2 review fix).
        checksum/master-config: {{ include (print $.Template.BasePath "/manager-secret.yaml") . | sha256sum }}
        {{- with .Values.manager.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kube-dc.manager.labels" . | nindent 8 }}
        {{- with .Values.manager.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.manager.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          - --config-secret-name=master-config
          - --config-secret-namespace=$(NAMESPACE)
          - --zap-log-level={{ .Values.manager.logLevel | default "1" }}
          - --keycloak-debug={{ .Values.manager.keycloakDebug | default "false" }}
          - --grafana-tenant-mode={{ .Values.manager.grafanaTenantMode | default "org" }}
        env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          {{- with .Values.manager.extraEnv }}
          {{- toYaml . | nindent 10 }}
          {{- end }}

        image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag | default .Chart.AppVersion }}"
        name: manager
        securityContext:
          allowPrivilegeEscalation: true
          capabilities:
            add:
            - "ALL"
          privileged: true
        {{- if .Values.manager.webhook.enabled }}
        ports:
          - name: webhook-server
            containerPort: 9443
            protocol: TCP
        volumeMounts:
          - name: webhook-cert
            mountPath: /tmp/k8s-webhook-server/serving-certs
            readOnly: true
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.manager.resources | nindent 12 }}
      serviceAccountName: {{ include "kube-dc.manager.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      {{- if .Values.manager.webhook.enabled }}
      volumes:
        - name: webhook-cert
          secret:
            secretName: {{ include "kube-dc.manager.fullname" . }}-webhook-serving-cert
            defaultMode: 420
      {{- end }}
      {{- with .Values.manager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
