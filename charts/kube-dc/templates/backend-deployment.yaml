apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-dc.backend.fullname" . }}
  labels:
    {{- include "kube-dc.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kube-dc.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Rolls the backend Pod whenever the master-config Secret content
        # changes. The Secret is rendered from chart values (SMTP, OpenBao,
        # ALLOW_PUBLIC_PROJECTS, …). Without this checksum, env vars sourced
        # via secretKeyRef stay stale on running Pods after a Helm upgrade
        # that only changed the Secret. See
        # kube-dc/docs/prd/public-projects-gate.md (F2 review fix).
        checksum/master-config: {{ include (print $.Template.BasePath "/manager-secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kube-dc.backend.labels" . | nindent 8 }}
        {{- with .Values.backend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.backend.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kube-dc.backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3333 #{{ .Values.backend.service.port }}
              protocol: TCP
          env:
            - name: PROM_URL
              value: "{{ .Values.backend.prometheusUrl | default "http://prom-operator-prometheus.monitoring:9090" }}"
            - name: PROJECT_SHELL_API_URL
              value: "{{ .Values.kubeApiExternalUrl }}"
            # S3 endpoint for tenant Object Storage views, KdcDatabase
            # backup wiring, and quota lookups. Per-cluster value —
            # earlier versions of the JS controllers fell back to a
            # hardcoded `https://s3.kube-dc.cloud` when the env var
            # wasn't set, which made every non-cloud cluster's UI
            # render the wrong S3 hostname. The fall-back is still
            # there in code (`process.env.S3_ENDPOINT || 'https://s3.kube-dc.cloud'`)
            # but with this chart change, the env is always set when
            # `s3Endpoint` is provided in values, so the fallback path
            # never runs in production. Leave the value empty in
            # values.yaml if you want the fallback (single-cluster
            # cloud-only deployment).
            {{- if .Values.s3Endpoint }}
            - name: S3_ENDPOINT
              value: "{{ .Values.s3Endpoint }}"
            {{- end }}
            # Public Grafana hostname for the "Open Grafana" SSO
            # redirect. Same per-cluster pattern as s3Endpoint —
            # backend has no hardcoded fallback so the launch endpoint
            # returns 503 when this is unset, rather than silently
            # sending users to a domain they don't own.
            {{- if .Values.grafanaUrl }}
            - name: GRAFANA_URL
              value: "{{ .Values.grafanaUrl }}"
            {{- end }}
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: master-config
                  key: url
            - name: CONSOLE_URL
              valueFrom:
                secretKeyRef:
                  name: master-config
                  key: console_url
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: master-config
                  key: user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: master-config
                  key: password
            {{- if .Values.backend.smtp.enabled }}
            - name: SMTP_HOST
              value: "{{ .Values.backend.smtp.host }}"
            - name: SMTP_PORT
              value: "{{ .Values.backend.smtp.port }}"
            - name: SMTP_SECURE
              value: "{{ .Values.backend.smtp.secure }}"
            - name: SMTP_USER
              value: "{{ .Values.backend.smtp.user }}"
            - name: SMTP_PASS
              value: "{{ .Values.backend.smtp.password }}"
            - name: SMTP_FROM
              value: "{{ .Values.backend.smtp.from }}"
            - name: SMTP_FROM_NAME
              value: "{{ .Values.backend.smtp.fromName }}"
            {{- end }}
            {{- if ne .Values.billing.provider "none" }}
            - name: BILLING_PROVIDER
              value: "{{ .Values.billing.provider }}"
            {{- end }}
            {{- if eq .Values.billing.provider "stripe" }}
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.secretName }}
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.secretName }}
                  key: STRIPE_WEBHOOK_SECRET
            - name: STRIPE_PRICE_DEV_POOL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.secretName }}
                  key: STRIPE_PRICE_DEV_POOL
            - name: STRIPE_PRICE_PRO_POOL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.secretName }}
                  key: STRIPE_PRICE_PRO_POOL
            - name: STRIPE_PRICE_SCALE_POOL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.secretName }}
                  key: STRIPE_PRICE_SCALE_POOL
            - name: STRIPE_PRICE_TURBO_X1
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.secretName }}
                  key: STRIPE_PRICE_TURBO_X1
            - name: STRIPE_PRICE_TURBO_X2
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.secretName }}
                  key: STRIPE_PRICE_TURBO_X2
            {{- end }}
            {{- if or (eq .Values.billing.provider "whmcs") (eq .Values.billing.provider "dual") }}
            - name: WHMCS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: whmcs-credentials
                  key: webhook-secret
            {{- end }}
            # Public-projects gate (see kube-dc/docs/prd/public-projects-gate.md).
            # The backend uses this to gate the egressNetworkType=public
            # option in the project-create form. The manager-side
            # ValidatingWebhook also reads `allow_public_projects` directly
            # from the master-config Secret it loads via ConfigGlobal —
            # this env is purely the UI's view of the same source of truth.
            #
            # NOT gated on .Values.manager.openBao.enabled — every cluster
            # needs the UI feature flag whether or not OpenBao is in use.
            # `optional: true` covers the bootstrap window before the
            # chart re-renders the master-config Secret to include the
            # new key.
            - name: ALLOW_PUBLIC_PROJECTS
              valueFrom:
                secretKeyRef:
                  name: master-config
                  key: allow_public_projects
                  optional: true
            {{- if and .Values.manager.openBao .Values.manager.openBao.enabled }}
            # M1-T04: backend exchanges users' Keycloak JWTs against
            # the per-Org auth/oidc-keycloak OpenBao mount. Same URL
            # the manager reads from master-config; surfaced as env so
            # the Node.js Vault client doesn't need the secret mount.
            - name: OPENBAO_URL
              valueFrom:
                secretKeyRef:
                  name: master-config
                  key: openbao_url
            # M1-T05: structured audit events for every /api/secrets/*
            # call ship to this Loki push endpoint under the configured
            # tenant (X-Scope-OrgID), per dev-scope §5. Default points
            # at the in-cluster loki-gateway; leave empty (or unset
            # backend.audit.lokiPushUrl) to disable audit emission
            # without breaking the rest of the secrets API.
            - name: LOKI_PUSH_URL
              value: "{{ .Values.backend.audit.lokiPushUrl | default "http://loki-gateway.monitoring.svc:80" }}"
            # M1-T05b: audit query endpoints (/api/audit/*) read from
            # this URL. Defaults to the push URL when not separately
            # set so push and query stay in lock-step when an operator
            # customises one of them.
            - name: LOKI_QUERY_URL
              value: "{{ .Values.backend.audit.lokiQueryUrl | default .Values.backend.audit.lokiPushUrl | default "http://loki-gateway.monitoring.svc:80" }}"
            - name: LOKI_AUDIT_TENANT
              value: "{{ .Values.backend.audit.tenant | default "system" }}"
            {{- end }}
          {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- with .Values.backend.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.backend.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
