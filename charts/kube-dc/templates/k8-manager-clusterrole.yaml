{{- if .Values.k8Manager.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-dc.k8manager.fullname" . }}
  labels:
    {{- include "kube-dc.k8manager.labels" . | nindent 4 }}
rules:
# BOC #2: read the KamajiControlPlane CRD schema to detect whether the
# kube-dc-forked control-plane provider is installed (kube-proxy JSON-patch
# capability gate). Without this the gate fails closed and #2 is silently
# never written. See kdccluster_kubelet_kubeproxy.go::kcpSupportsKubeProxyJSONPatches.
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - bootstrap.cluster.x-k8s.io
  resources:
  - kubeadmconfigtemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Read-only access to cert-manager Issuer and ClusterIssuer resources.
# Required by reconcileCertificateCARotation in the KdcClusterDatastore
# controller so it can resolve the Issuer's CA secret and compare the
# upstream CA Subject Key Identifier against the SKI embedded in
# leaf cert Secrets it manages. Without this, the drift detector logs
# "CA rotation: could not resolve Issuer CA, skipping drift check" on
# every reconcile and never forces leaf re-issuance after a CA rotation.
- apiGroups:
  - cert-manager.io
  resources:
  - issuers
  - clusterissuers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - clusters
  - machinedeployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# machinesets needs patch for the MS status-drift self-heal annotation
# (pokeMachineSetIfStatusDrift). machines (read-only) is the ground-truth
# the self-heal counts to compare against MS.status.readyReplicas.
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machinesets
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - controlplane.cluster.x-k8s.io
  resources:
  - kamajicontrolplanes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - cloudsigmaclusters
  - cloudsigmamachinetemplates
  - kubevirtclusters
  - kubevirtmachinetemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# kubevirtmachines + cloudsigmamachines: needed by reapOrphanInfraMachineFinalizers
# in kdccluster_controller.reconcileDelete to strip the infra-provider's own
# stuck finalizer after CAPI Cluster is gone (cloud incident 2026-06-03 —
# anup-test had a 1.5-month-old stuck kubevirtmachine blocking ns Terminating).
# Read+update only; we never create/delete the CRs themselves — CAPI owns
# their lifecycle. The /finalizers subresource grant covers the finalizer
# update path on apiservers that gate it separately.
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - cloudsigmamachines
  - kubevirtmachines
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - cloudsigmamachines/finalizers
  - kubevirtmachines/finalizers
  verbs:
  - update
- apiGroups:
  - k8s.kube-dc.com
  resources:
  - kdcclusterdatastores
  - kdcclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s.kube-dc.com
  resources:
  - kdcclusterdatastores/finalizers
  - kdcclusters/finalizers
  verbs:
  - update
- apiGroups:
  - k8s.kube-dc.com
  resources:
  - kdcclusterdatastores/status
  - kdcclusters/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - security.kube-dc.com
  resources:
  - kmskeys
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kamaji.clastix.io
  resources:
  - datastores
  - tenantcontrolplanes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kube-dc.com
  resources:
  - eips
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ipam.cluster.x-k8s.io
  resources:
  - ipaddresses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ipam.cluster.x-k8s.io
  resources:
  - ipaddressclaims
  verbs:
  - get
  - list
  - watch
  - create
  - delete
- apiGroups:
  - kube-dc.com
  resources:
  - projects
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kubevirt.io
  resources:
  - virtualmachineinstances
  verbs:
  - get
  - list
  - update
  - watch
- apiGroups:
  - kubevirt.io
  resources:
  - virtualmachines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoscaling.k8s.io
  resources:
  - verticalpodautoscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Per-cluster etcd snapshot CronJobs created by reconcileBackup.
# See docs/prd/managed-k8s-etcd-backups.md
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Read-only access to ObjectBucketClaims for backup-bucket discovery
# (the bucket itself is provisioned by the kube-dc Project controller).
- apiGroups:
  - objectbucket.io
  resources:
  - objectbucketclaims
  verbs:
  - get
  - list
  - watch
# Permissions delegated to the per-cluster kubevirt-csi-controller
# Role that reconcileKubevirtCSI creates. RBAC's "no privilege
# escalation" rule means the manager can only grant what it itself
# holds — listing them here lets the manager create the per-tenant
# Role + RoleBinding without 403 from the apiserver.
# See shalb/kube-dc docs/prd/tenant-cluster-teardown-gc.md §D1.
- apiGroups:
  - cdi.kubevirt.io
  resources:
  - datavolumes
  verbs:
  - create
  - delete
  - get
- apiGroups:
  - subresources.kubevirt.io
  resources:
  - virtualmachines/addvolume
  - virtualmachines/removevolume
  verbs:
  - update
- apiGroups:
  - snapshot.storage.k8s.io
  resources:
  - volumesnapshots
  verbs:
  - create
  - delete
  - get
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs:
  - delete
  - get
  - list
  - patch
  - watch
{{- end }}
