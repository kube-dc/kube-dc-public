{{- if and .Values.adminFrontend.enabled .Values.adminFrontend.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-dc.adminFrontend.serviceAccountName" . }}
  labels:
    {{- include "kube-dc.adminFrontend.labels" . | nindent 4 }}
  {{- with .Values.adminFrontend.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.adminFrontend.serviceAccount.automount }}
{{- end }}
