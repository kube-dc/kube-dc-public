apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kube-dc.frontend.fullname" . }}-config
data:
  env.js: |
    window.backendURL = 'https://{{ .Values.backend.gateway.hostname }}';
    window.frontendURL = 'https://{{ .Values.frontend.gateway.hostname }}';
    window.keycloakURL = '{{ .Values.manager.keycloakSecret.url }}';
    {{- /* printf-normalize: string "false" from Flux substitution must
       render JS false, not survive `default` as a truthy string. */}}
    window.ssoEnabled = {{ if eq (printf "%v" .Values.manager.keycloakSecret.ssoEnabled) "true" }}true{{ else }}false{{ end }};
    {{- if .Values.frontend.extraJsEnv }}
    {{- range $key, $value := .Values.frontend.extraJsEnv }}
    window.{{ $key }} = '{{ $value }}';
    {{- end }}
    {{- end }}