apiVersion: v1
kind: Secret
metadata:
  name: master-config
type: Opaque
stringData:
  url: {{ .Values.manager.keycloakSecret.url }}
  user: {{ .Values.manager.keycloakSecret.user }}
  password: {{ .Values.manager.keycloakSecret.password }}
  master_realm: {{ .Values.manager.keycloakSecret.masterRealm }}
  console_url: {{ .Values.manager.keycloakSecret.consoleUrl }}
  ovn_db_ips: {{ .Values.manager.ovnDbIps }}
  {{- if .Values.manager.defaultGwNetworkType }}
  default_gw_network_type: {{ .Values.manager.defaultGwNetworkType }}
  {{- end }}
  {{- if .Values.manager.defaultEipNetworkType }}
  default_eip_network_type: {{ .Values.manager.defaultEipNetworkType }}
  {{- end }}
  {{- if .Values.manager.defaultFipNetworkType }}
  default_fip_network_type: {{ .Values.manager.defaultFipNetworkType }}
  {{- end }}
  {{- if .Values.manager.defaultSvcLbNetworkType }}
  default_svc_lb_network_type: {{ .Values.manager.defaultSvcLbNetworkType }}
  {{- end }}
  {{- if .Values.manager.baseDomain }}
  base_domain: {{ .Values.manager.baseDomain }}
  {{- end }}
  egress_network_isolation: {{ .Values.manager.egressNetworkIsolation | default true | quote }}
  {{- if .Values.manager.egressGlobalAllowlist }}
  egress_global_allowlist: {{ .Values.manager.egressGlobalAllowlist | toJson | quote }}
  {{- end }}
  ingress_network_isolation: {{ .Values.manager.ingressNetworkIsolation | default false | quote }}
  {{- if .Values.manager.ingressGlobalAllowlist }}
  ingress_global_allowlist: {{ .Values.manager.ingressGlobalAllowlist | toJson | quote }}
  {{- end }}
  # Gate creation of Projects with spec.egressNetworkType=public.
  # Default false — fresh installs reject public-egress projects unless
  # the operator explicitly opts in. The Project ValidatingWebhook
  # enforces this server-side; the UI hides the "public" option in the
  # project-creation form when this is false. Existing public-egress
  # Projects are NOT affected (egressNetworkType is immutable).
  # See kube-dc/docs/prd/public-projects-gate.md.
  allow_public_projects: {{ .Values.manager.allowPublicProjects | default false | quote }}
  {{- /* Normalize before testing: Flux postBuild substitution can
     deliver ssoEnabled as the STRING "false" (quoted in the fleet
     HelmRelease), which is truthy to a bare `if` — the block would
     render with an empty broker secret as literal "<no value>"
     (E2E 2026-07-05, finding 20). Compare the printed value so bool
     false, string "false", and unset all skip the block. */}}
  {{- if eq (printf "%v" .Values.manager.keycloakSecret.ssoEnabled) "true" }}
  ssoEnabled: "true"
  ssoBrokerSecret: {{ .Values.manager.keycloakSecret.ssoBrokerSecret }}
  googleClientId: {{ .Values.manager.keycloakSecret.googleClientId }}
  googleClientSecret: {{ .Values.manager.keycloakSecret.googleClientSecret }}
  {{- end }}
  {{- if .Values.backend.smtp.enabled }}
  smtp_host: {{ .Values.backend.smtp.host }}
  smtp_port: {{ .Values.backend.smtp.port | quote }}
  smtp_from: {{ .Values.backend.smtp.from }}
  smtp_from_name: {{ .Values.backend.smtp.fromName }}
  smtp_user: {{ .Values.backend.smtp.user | default "" | quote }}
  smtp_password: {{ .Values.backend.smtp.password | default "" | quote }}
  # smtp_secure: "true" → implicit TLS (SMTPS, port 465). "false" →
  # opportunistic STARTTLS (ports 25 / 587). Empty/unset → manager
  # infers from the port (465 ⇒ implicit-TLS, else STARTTLS). Matches
  # nodemailer's `secure` flag used by the kube-dc-backend.
  smtp_secure: {{ .Values.backend.smtp.secure | default "" | quote }}
  {{- end }}
  {{- if .Values.manager.openBao }}
  {{- if .Values.manager.openBao.enabled }}
  enable_openbao: {{ .Values.manager.openBao.enabled | quote }}
  openbao_url: {{ required "manager.openBao.url is required when manager.openBao.enabled=true" .Values.manager.openBao.url | quote }}
  {{- if .Values.manager.openBao.caBundle }}
  openbao_ca_bundle: {{ .Values.manager.openBao.caBundle | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
