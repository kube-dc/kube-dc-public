{{- /*
Platform endpoint: internal cluster-local kube-api VIP (Fork E2).

Tenant pods reach the apiserver through a MetalLB-announced VIP
(`spec.loadBalancerIP`) instead of the cluster's external Envoy/MetalLB
path that breaks on cloudacropolis-class NAT topologies. kube-proxy
on the elected MetalLB speaker DNATs to one of the live control-plane
host IPs.

Renders three resources when `.Values.platformEndpoints.kubeAPI.enabled`:
  1. metallb.io/v1beta1 IPAddressPool   (in metallb-system)
  2. metallb.io/v1beta1 L2Advertisement (in metallb-system)
  3. v1 Service                         (in `.namespace`, selectorless,
                                         type=LoadBalancer, annotated for
                                         the platform-endpoint controller)

Does NOT render an EndpointSlice. kube-dc-manager's platform-endpoint
controller creates `<svc-name>-mgr` on first reconcile with an
OwnerReference back to the Service so K8s garbage-collects the slice
when the Service is deleted.

See:
  docs/prd/internal-platform-endpoints-implementation.md (design)
  docs/internal/internal-platform-endpoints-runbook.md   (operator)
*/}}

{{- $cfg := .Values.platformEndpoints.kubeAPI -}}
{{- if $cfg.enabled -}}
{{- if not $cfg.vip -}}
{{- fail "platformEndpoints.kubeAPI.enabled=true but .vip is empty — VIP must be reserved in the ext-cloud Subnet.excludeIps AND added to both INGRESS_GLOBAL_ALLOWLIST and EGRESS_GLOBAL_ALLOWLIST before enabling" -}}
{{- end -}}
{{- if not $cfg.loadBalancerClass -}}
{{- fail "platformEndpoints.kubeAPI.enabled=true but .loadBalancerClass is empty — must match the MetalLB controller's --lb-class flag" -}}
{{- end -}}
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ $cfg.pool | quote }}
  namespace: metallb-system
  labels:
    app.kubernetes.io/managed-by: kube-dc
    app.kubernetes.io/component: platform-endpoint
spec:
  # /32 — exactly the VIP, never auto-allocated to anything else.
  addresses:
    - {{ printf "%s/32" $cfg.vip | quote }}
  # Require Services to opt in via spec.loadBalancerIP. Prevents
  # any other LB Service from grabbing the VIP by accident.
  autoAssign: false
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ $cfg.pool | quote }}
  namespace: metallb-system
  labels:
    app.kubernetes.io/managed-by: kube-dc
    app.kubernetes.io/component: platform-endpoint
spec:
  ipAddressPools:
    - {{ $cfg.pool | quote }}
  interfaces:
    - {{ $cfg.interface | quote }}
  {{- with $cfg.l2AdvNodeSelectors }}
  # Constrain MetalLB speaker election to nodes matching these label
  # selectors. Needed on heterogeneous clusters where only some nodes
  # have the anchor bridge (e.g. separate CP + workers, mixed NIC
  # layouts). When empty, any node running metallb-speaker is eligible.
  nodeSelectors:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $cfg.name | quote }}
  namespace: {{ $cfg.namespace | quote }}
  labels:
    app.kubernetes.io/managed-by: kube-dc
    app.kubernetes.io/component: platform-endpoint
  annotations:
    # MetalLB pool routing — the address-pool annotation is the
    # canonical opt-in (Service grabs an IP from this specific pool).
    metallb.universe.tf/address-pool: {{ $cfg.pool | quote }}
    # Platform-endpoint controller annotations (consumed by
    # internal/controller/core/platform_endpoint_controller.go).
    # Presence of kube-dc.com/backend-source is the watch filter.
    kube-dc.com/backend-source: {{ $cfg.backend.mode | quote }}
    # NodeSelector serialized as "key=value,key2=value2". Empty
    # value (e.g. `key=`) is parsed as a label-exists requirement —
    # matches both kubeadm ("") and RKE2 ("true") topologies, same
    # as `kubectl -l key`. See internal/platform_endpoint/discover.go
    # buildNodeSelector for the parsing.
    {{- $parts := list }}
    {{- range $k, $v := $cfg.backend.nodeSelector }}
    {{- $parts = append $parts (printf "%s=%s" $k $v) }}
    {{- end }}
    kube-dc.com/backend-node-selector: {{ join "," $parts | quote }}
    kube-dc.com/backend-address-type: {{ $cfg.backend.addressType | quote }}
    kube-dc.com/health-scheme: {{ $cfg.backend.health.scheme | quote }}
    kube-dc.com/health-path: {{ $cfg.backend.health.path | quote }}
    kube-dc.com/health-port: {{ $cfg.backend.health.port | quote }}
    kube-dc.com/health-interval-seconds: {{ $cfg.backend.health.intervalSeconds | quote }}
    kube-dc.com/health-timeout-seconds: {{ $cfg.backend.health.timeoutSeconds | quote }}
    kube-dc.com/health-failure-threshold: {{ $cfg.backend.health.failureThreshold | quote }}
    kube-dc.com/health-success-threshold: {{ $cfg.backend.health.successThreshold | quote }}
    kube-dc.com/health-insecure-skip-verify: {{ $cfg.backend.health.insecureSkipVerify | quote }}
    kube-dc.com/health-status-max: {{ $cfg.backend.health.statusMax | quote }}
spec:
  type: LoadBalancer
  # REQUIRED — MetalLB filters Services by --lb-class. Without this
  # the Service stays <pending> indefinitely.
  loadBalancerClass: {{ $cfg.loadBalancerClass | quote }}
  loadBalancerIP: {{ $cfg.vip | quote }}
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  {{- with $cfg.sessionAffinity }}
  sessionAffinity: {{ . | quote }}
  {{- end }}
  ports:
    - name: https
      port: {{ $cfg.port }}
      targetPort: {{ $cfg.port }}
      protocol: TCP
  # Selectorless — no spec.selector. kube-dc-manager's
  # platform-endpoint controller creates and maintains
  # `<name>-mgr` EndpointSlice, which K8s aggregates for kube-proxy.
{{- end }}
