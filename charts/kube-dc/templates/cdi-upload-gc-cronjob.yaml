{{- if .Values.cdiUploadGc.enabled }}
# =============================================================================
# CDI worker-pod GC CronJob
#
# When a CDI DataVolume gets stuck (canonical example: clone scheduled but
# the source-PVC controller never produces a TLS Secret for the upload
# server, so cdi-upload-<dv> stays in ContainerCreating forever), CDI
# itself does NOT garbage-collect after the DEADLINE annotation passes.
# Live evidence on cloud: bogdan-test2/cdi-upload-froma20-root was stuck
# in ContainerCreating for 51 days, firing 6 KubeContainerWaiting + 1
# KubePodNotReady alerts (collapsed to 2 after C1 per-pod aggregation).
#
# This CronJob audits CDI worker pods (cdi-upload-*, cdi-importer-*,
# cdi-clone-*) that are non-terminal for >7 days, looks up their parent
# DataVolume, and (if .Values.cdiUploadGc.delete=true) deletes the DV.
# Default is audit-only — operator enables deletion explicitly.
#
# Targeting `Pending|ContainerCreating` pods means we don't touch DVs
# whose worker is healthy and progressing; they cycle to Succeeded
# within minutes for normal uploads. The 7-day floor protects very
# slow legitimate uploads.
#
# PRD: docs/prd/alerts-noise-cleanup.md §4.F (F1/F2).
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cdi-upload-gc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dc.manager.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-dc.manager.fullname" . }}-cdi-upload-gc
  labels:
    {{- include "kube-dc.manager.labels" . | nindent 4 }}
rules:
  # Read pods cluster-wide to find stuck CDI workers.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read + delete DataVolumes when audit confirms the parent is stuck.
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-dc.manager.fullname" . }}-cdi-upload-gc
  labels:
    {{- include "kube-dc.manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-dc.manager.fullname" . }}-cdi-upload-gc
subjects:
  - kind: ServiceAccount
    name: cdi-upload-gc
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cdi-upload-gc-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dc.manager.labels" . | nindent 4 }}
data:
  gc.sh: |
    #!/bin/sh
    # GC stuck CDI worker pods + parent DataVolumes.
    # Two passes:
    #   1. Pending|Unknown worker pods older than GC_STALE_DAYS (default 7d):
    #      catches the "upload/clone scheduled but never landed" class.
    #   2. DataVolumes in phase Failed older than GC_FAILED_HOURS (default
    #      6h): catches the "importer is in CrashLoopBackOff against a
    #      404 URL" class. Live evidence: shalb-jumbolot/new-vm-root
    #      ran the importer 2,838 times over 10 days because the Gentoo
    #      catalog URL had rotated out (incident 2026-05-11). 6h is well
    #      above the wall-clock budget of any legitimate import.
    # Audit-only unless GC_DELETE=true.
    #
    # pipefail is critical here: every pass is `kubectl ... | jq ...`,
    # and `set -e` alone does NOT catch a failed kubectl in a pipe.
    # Without this, a misconfigured kubectl (e.g. when --request-timeout
    # broke in-cluster auto-config in v0.3.16 / kubectl v1.35.4) feeds
    # empty input to jq and the while-loop silently no-ops — script
    # exits 0 having done nothing. Live evidence: cdi-upload-gc has been
    # running for months thinking everything is clean while leaving
    # 51-day-stuck DVs in place (bogdan-test2/cdi-upload-froma20-root).
    # With pipefail, that same failure mode exits non-zero immediately
    # and trips KubeJobFailed so we see it.
    set -euo pipefail

    GC_STALE_DAYS="${GC_STALE_DAYS:-7}"
    GC_FAILED_HOURS="${GC_FAILED_HOURS:-6}"
    GC_IMPORT_DEADLINE_MINUTES="${GC_IMPORT_DEADLINE_MINUTES:-30}"
    GC_DELETE="${GC_DELETE:-false}"
    NOW=$(date -u +%s)
    THRESHOLD=$((NOW - GC_STALE_DAYS * 86400))
    FAILED_THRESHOLD=$((NOW - GC_FAILED_HOURS * 3600))
    IMPORT_THRESHOLD=$((NOW - GC_IMPORT_DEADLINE_MINUTES * 60))

    echo "cdi-upload-gc: stale-threshold=${GC_STALE_DAYS}d failed-threshold=${GC_FAILED_HOURS}h import-deadline=${GC_IMPORT_DEADLINE_MINUTES}m delete=${GC_DELETE}"

    # Pass 1: stuck worker pods.
    # Find non-terminal CDI worker pods older than the threshold.
    # `cdi-(upload|importer|clone)-<dv-name>` is CDI's pod naming
    # convention. The DV name is what's left after the prefix strip.
    kubectl get pods -A -o json \
      | jq -r --argjson threshold "$THRESHOLD" '
          .items[]
          | select(.metadata.name | test("^cdi-(upload|importer|clone)-"))
          | select(.status.phase | test("^(Pending|Unknown)$"))
          | select((.metadata.creationTimestamp | fromdateiso8601) < $threshold)
          | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns pod; do
          dv="${pod#cdi-upload-}"
          dv="${dv#cdi-importer-}"
          dv="${dv#cdi-clone-}"
          if ! kubectl get datavolume -n "$ns" "$dv" >/dev/null 2>&1; then
            echo "[skip] no DataVolume $ns/$dv found for stuck pod $pod"
            continue
          fi
          if [ "$GC_DELETE" = "true" ]; then
            echo "[delete] DV $ns/$dv (parent of stuck pod $pod, age >${GC_STALE_DAYS}d)"
            # `|| true` swallows races (DV was already deleted by the CDI
            # controller between the `get` above and this `delete`; or the
            # namespace is terminating). Under `set -o pipefail` an
            # un-guarded non-zero from inside this while-body propagates
            # all the way out of the pipeline and fails the script — which
            # is the v0.3.17 alert noise we saw on cloud (Job
            # cdi-upload-gc-29650680 exited non-zero in 84s on a transient
            # race). Real apiserver outages still fail the outer
            # `kubectl get` and trip KubeJobFailed.
            kubectl delete datavolume -n "$ns" "$dv" --wait=false \
              || echo "[warn] delete failed for $ns/$dv (likely race; will retry next cycle)"
          else
            echo "[audit] would delete DV $ns/$dv (parent of stuck pod $pod, age >${GC_STALE_DAYS}d)"
          fi
        done

    # Pass 2: DataVolumes in phase Failed for more than GC_FAILED_HOURS.
    # CDI never gives up on its own; without this pass the importer
    # crashloops indefinitely against an unreachable source URL.
    kubectl get datavolume -A -o json \
      | jq -r --argjson threshold "$FAILED_THRESHOLD" '
          .items[]
          | select(.status.phase == "Failed")
          | select(((.metadata.creationTimestamp // "1970-01-01T00:00:00Z") | fromdateiso8601) < $threshold)
          | "\(.metadata.namespace) \(.metadata.name) \(.metadata.creationTimestamp)"' \
      | while read -r ns dv created; do
          if [ "$GC_DELETE" = "true" ]; then
            echo "[delete] failed DV $ns/$dv (created $created, >${GC_FAILED_HOURS}h)"
            kubectl delete datavolume -n "$ns" "$dv" --wait=false \
              || echo "[warn] delete failed for $ns/$dv (likely race; will retry next cycle)"
          else
            echo "[audit] would delete failed DV $ns/$dv (created $created, >${GC_FAILED_HOURS}h)"
          fi
        done

    # Pass 3: DataVolumes still in ImportInProgress / ImportScheduled
    # past the deadline. Implements PRD §5.1.1 ("time-bound importer
    # retries") without a separate Go controller — CDI offers no
    # native equivalent of `spec.source.http.failureRetryLimit`.
    # 30 min default is well above the wall-clock budget of any image
    # we ship in the default catalog at the worst observed WAN
    # throughput (Windows golden 21 GiB ~ 10 min over LAN; a 30-min
    # importer is broken, not slow). The Failed-DV pass (6h) is the
    # safety net for any importer that *does* eventually fail on its
    # own; this pass catches the 2,838-restart class where CDI
    # crashloops indefinitely against an unreachable source URL.
    #
    # We delete the DataVolume rather than just the importer Pod —
    # CDI would just respawn the pod against the same DV. The tenant
    # sees their VM creation surface a "DataVolume not found" error
    # at next reconcile, which is the correct signal: their image
    # URL is broken; they should pick a different one.
    kubectl get datavolume -A -o json \
      | jq -r --argjson threshold "$IMPORT_THRESHOLD" '
          .items[]
          | select((.status.phase // "") | test("^(ImportInProgress|ImportScheduled)$"))
          | select(((.metadata.creationTimestamp // "1970-01-01T00:00:00Z") | fromdateiso8601) < $threshold)
          | "\(.metadata.namespace) \(.metadata.name) \(.metadata.creationTimestamp) \(.status.phase)"' \
      | while read -r ns dv created phase; do
          if [ "$GC_DELETE" = "true" ]; then
            echo "[delete] importing DV $ns/$dv (phase=$phase, created $created, >${GC_IMPORT_DEADLINE_MINUTES}m)"
            kubectl delete datavolume -n "$ns" "$dv" --wait=false \
              || echo "[warn] delete failed for $ns/$dv (likely race; will retry next cycle)"
          else
            echo "[audit] would delete importing DV $ns/$dv (phase=$phase, created $created, >${GC_IMPORT_DEADLINE_MINUTES}m)"
          fi
        done

    echo "cdi-upload-gc: done"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cdi-upload-gc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-dc.manager.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cdiUploadGc.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400 # 1d
      # 5 min hard cap. The deterministic gc.sh work (two kubectl
      # list calls + jq + per-match delete) completes in seconds on
      # a healthy cluster; if a single run exceeds this, something
      # is wrong with apiserver/network and burning the next 5 hours
      # of pod time on it won't help.
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: cdi-upload-gc
          restartPolicy: OnFailure
          containers:
            - name: gc
              image: {{ .Values.cdiUploadGc.image | quote }}
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "/scripts/gc.sh"]
              env:
                - name: GC_STALE_DAYS
                  value: {{ .Values.cdiUploadGc.staleDays | quote }}
                - name: GC_FAILED_HOURS
                  value: {{ .Values.cdiUploadGc.failedHours | quote }}
                - name: GC_IMPORT_DEADLINE_MINUTES
                  value: {{ .Values.cdiUploadGc.importDeadlineMinutes | quote }}
                - name: GC_DELETE
                  value: {{ .Values.cdiUploadGc.delete | quote }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                # 128Mi was OOMKilling the pod on busy clusters
                # (cloud, 346 pods → ~7 MiB JSON output from
                # `kubectl get pods -A -o json` → kubectl+jq peak
                # working set >128Mi). exit code 137 within ~1s of
                # container start; pipefail caught nothing because
                # the kill happened mid-pipeline. Bumped limit to
                # 384Mi which is comfortably above what kubectl+jq
                # need to parse the entire cluster's pod list with
                # headroom for larger clusters in the future.
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 384Mi
          volumes:
            - name: scripts
              configMap:
                name: cdi-upload-gc-script
                defaultMode: 0755
{{- end }}
