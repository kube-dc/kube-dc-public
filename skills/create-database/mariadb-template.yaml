apiVersion: db.kube-dc.com/v1alpha1
kind: KdcDatabase
metadata:
  name: {db-name}
  namespace: {project-namespace}
spec:
  engine: mariadb
  version: "11.4"
  replicas: 1
  cpu: "1"
  memory: 2Gi
  storage: 10Gi
  databaseName: {database-name}
  username: app
  expose:
    type: internal          # internal | gateway | loadbalancer
  # Scheduled physical backups land in the project's auto-provisioned S3
  # bucket (`{project-namespace}-db-backups`). Manual backups must use
  # `target: PreferReplica` — see backup-restore-patterns.md.
  backup:
    enabled: true
    schedule: "0 2 * * *"   # daily at 02:00
    retentionDays: 7
