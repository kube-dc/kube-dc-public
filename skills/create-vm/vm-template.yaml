apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: {vm-name}-disk
  namespace: {project-namespace}
spec:
  source:
    registry:
      # ALWAYS digest-pinned — never a bare tag or :latest.
      # Ready refs: platform catalog (UI "OS Images"); quay.io/containerdisks/<os> for standard images.
      url: "docker://quay.io/containerdisks/ubuntu:24.04@sha256:ec914ce2270fd5e0e729a98a91664dbac50a3c5c15d744da9c6fb51bc25e81f8"
      pullMethod: node    # pull via the node's containerd — faster, cached, works from any tenant VPC
    # Fallback — HTTP import (Windows/ISO, custom images): replace `registry` above with:
    # http:
    #   url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi
    storageClassName: local-path
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {vm-name}
  namespace: {project-namespace}
  labels:
    app: {vm-name}
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/domain: {vm-name}
        app: {vm-name}
    spec:
      accessCredentials:
        - sshPublicKey:
            source:
              secret:
                secretName: authorized-keys-default
            propagationMethod:
              qemuGuestAgent:
                users:
                  - ubuntu    # Match OS default user: ubuntu, debian, centos, fedora, etc.
      domain:
        cpu:
          cores: 2
        memory:
          guest: 4Gi
        devices:
          disks:
            - name: disk0
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              bridge: {}
        resources:
          requests:
            memory: 4Gi
      networks:
        - name: default
          multus:
            networkName: {project-namespace}/default
      readinessProbe:
        guestAgentPing: {}
        initialDelaySeconds: 30
        periodSeconds: 10
      volumes:
        - name: disk0
          dataVolume:
            name: {vm-name}-disk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              package_update: true
              packages:
                - qemu-guest-agent
              runcmd:
                - systemctl enable --now qemu-guest-agent
