apiVersion: security.kube-dc.com/v1alpha1
kind: ManagedSecret
metadata:
  name: {secret-name}
  namespace: {project-namespace}        # {org}-{project}
spec:
  # Type drives UI rendering + permission policy. Pick `opaque` unless the
  # secret has a defined shape the platform should validate.
  type: opaque                          # opaque | password | api-key | tls | db-static

  description: "Short human-readable label surfaced in the UI"

  sync:
    # When true (default), values land in a Kubernetes Secret your workloads
    # can mount via envFrom / volumeMounts. Disable to keep values in OpenBao
    # only — readable via `kube-dc secrets get --reveal`.
    enabled: true

    # Kubernetes Secret name. Defaults to the ManagedSecret name. Override
    # when you want a stable name across renames or to match an existing
    # workload's secretRef.
    # targetSecretName: {custom-name}

    # ESO refresh poll interval. Most workloads are fine with 1h; lower for
    # rapidly-rotating tokens.
    refreshInterval: 1h

    # Optional key allowlist. When set, only these keys land in the synced
    # Secret. Useful when one ManagedSecret holds a superset of values that
    # several workloads consume different subsets of.
    # keys:
    #   - API_KEY
    #   - API_SECRET
