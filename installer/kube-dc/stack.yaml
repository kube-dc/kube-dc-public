name: cluster
template: "./templates/kube-dc/"
kind: Stack
backend: default
variables:
  debug: "true"
  kubeconfig: /home/voa/.kube/stage_config

  monitoring:
    prom_storage: 20Gi
    retention_size: 17GiB
    retention: 365d
  
  cluster_config:
    default_gw_network_type: "cloud"
    default_eip_network_type: "public"
    default_fip_network_type: "public"
    default_svc_lb_network_type: "public"
    POD_CIDR: "10.100.0.0/16"
    POD_GATEWAY: "10.100.0.1"
    SVC_CIDR: "10.101.0.0/16"
    JOIN_CIDR: "172.30.0.0/22"
    cluster_dns: "10.101.0.11"
    K8S_SERVICE_IP: "10.101.0.1"
    # Ingress network isolation: blocks inbound traffic from shared external VLANs to project VPCs
    # Enable only when workers share a cloud VLAN (e.g., CloudSigma private-link clusters)
    # ingress_network_isolation: true
    # ingress_global_allowlist:
    #   - "ovn-cluster-lrp-ip"  # REQUIRED: ovn-cluster LRP on ext-cloud (management VPC)
    #                           # Get it: kubectl get ovn-eip ovn-cluster-ext-cloud -o jsonpath='{.status.v4Ip}'

    default_external_network:
      type: cloud
      nodes_list:
        - kube-dc-master-1
        - kube-dc-worker-1
      name: ext-cloud
      vlan_id: "4013"
      interface: "enp0s31f6"
      cidr: "100.65.0.0/16"
      gateway: "100.65.0.1"
      mtu: "1400"
      exclude_ips: 
      - "100.65.0.1..100.65.0.100"
    
  node_external_ip: 88.99.29.250

  email: "noreply@kube-dc.com"
  domain: "stage.kube-dc.com"
  install_terraform: true
  kubeApiExternalUrl: "https://kube-api.stage.kube-dc.com:6443"

  # SMTP configuration for email notifications
  smtp:
    enabled: true
    host: "smtp.gmail.com"
    port: "587"
    secure: "false"
    user: ""        # Not required - IP whitelisted
    password: ""    # Not required - IP whitelisted
    from: "noreply@kube-dc.com"
    fromName: "Kube-DC"

  create_default:
    organization:
      name: shalb
      description: "Demo Organization"
      email: "demo@kube-dc.com"
    project:
      name: demo
      cidr_block: "10.0.10.0/24"
      egress_network_type: cloud
   

  versions:
    kube_dc: "v0.1.35" # release version
    kamaji_image: "edge-26.02.11-v3-kube-dc"
    kubevirt: "v1.7.2"
    kubevirt_cdi: "v1.65.0"
    # cluster_api: "v1.8.1"
    sveltos: "v1.7.0"
    # cluster_api_k3s_provider:  "v1.2.2"
    kyverno: "v1.17.1"
    # terraform: "1.9.4"
    kube_ovn: "v1.15.10"
    multus_helm: "2.2.19"
    envoy_gateway_helm: "v1.7.1"
    # ingress_nginx_helm: "4.11.1"
    keycloak_helm: "24.3.0"
    prom_operator_helm: "83.4.0"
    cert_manager_helm: "v1.20.1"
    loki_helm: "6.55.0"
    alloy_helm: "1.7.0"
    multus_helm_version: "v4.2.4"
    local_path_version: "v0.0.35"
    cnpg_chart: "0.28.0"
    mariadb_operator: "26.3.0"
    db_manager_enabled: false
    db_manager_image: "v0.1.0-dev24"

    
