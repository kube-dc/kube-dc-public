# cert-manager Issuers and Certificates for CAPI provider webhooks.
# clusterctl init creates self-signed certs that expire in 90 days
# without auto-renewal. These Certificate resources ensure cert-manager
# keeps them renewed automatically.
---
# === capi-system (core CAPI provider) ===
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: capi-selfsigned-issuer
  namespace: capi-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: capi-serving-cert
  namespace: capi-system
spec:
  dnsNames:
  - capi-webhook-service.capi-system.svc
  - capi-webhook-service.capi-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: capi-selfsigned-issuer
  secretName: capi-webhook-service-cert
  subject:
    organizations:
    - k8s-sig-cluster-lifecycle
  duration: 8760h  # 1 year
  renewBefore: 720h  # 30 days before expiry
---
