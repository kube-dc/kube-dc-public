# Kamaji values
# Custom kube-dc build with additional features
{{- $kamajiImageTag := (.variables.versions.kamaji_image | default "edge-26.02.11-v3-kube-dc") -}}

image:
  repository: shalb/kamaji
  tag: {{ $kamajiImageTag }}
  pullPolicy: IfNotPresent

# Use external kamaji-etcd datastore (deployed separately)
# Do not deploy built-in etcd subchart
etcd:
  deploy: false

datastore:
  enabled: false
  nameOverride: kamaji-etcd

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 4Gi

livenessProbe:
  httpGet:
    path: /healthz
    port: healthcheck
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 8

readinessProbe:
  httpGet:
    path: /readyz
    port: healthcheck
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

# Enable telemetry
telemetry:
  disabled: false

# Logging
loggingDevel:
  enable: false
