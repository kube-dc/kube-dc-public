# Kamaji values
# Custom kube-dc build with additional features
{{- $kamajiImageTag := (.variables.versions.kamaji_image | default "edge-25.11.21-kube-dc") -}}

image:
  repository: shalb/kamaji
  tag: {{ $kamajiImageTag }}
  pullPolicy: IfNotPresent

# Default datastore configuration
datastore:
  enabled: true
  driver: etcd
  endpoints:
    - kamaji-etcd-0.kamaji-etcd.kamaji-system.svc.cluster.local:2379
    - kamaji-etcd-1.kamaji-etcd.kamaji-system.svc.cluster.local:2379
    - kamaji-etcd-2.kamaji-etcd.kamaji-system.svc.cluster.local:2379

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: healthcheck
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 8

readinessProbe:
  httpGet:
    path: /readyz
    port: healthcheck
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

# Enable telemetry
telemetry:
  disabled: false

# Logging
loggingDevel:
  enable: false
