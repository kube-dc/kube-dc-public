# Extra RBAC for the custom kube-dc Kamaji build.
# The upstream Kamaji Helm chart does not include Gateway API permissions,
# but our fork (shalb/kamaji) watches Gateway resources for TCP ingress.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kamaji-gateway-api
  labels:
    app.kubernetes.io/name: kamaji
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/managed-by: kube-dc-installer
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["grpcroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["tlsroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kamaji-gateway-api
  labels:
    app.kubernetes.io/name: kamaji
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/managed-by: kube-dc-installer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kamaji-gateway-api
subjects:
  - kind: ServiceAccount
    name: kamaji-controller-manager
    namespace: kamaji-system
